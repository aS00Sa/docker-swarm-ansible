[all:vars]

docker_version=29.3.0
# Domain used in docker swarm nodes
app_domain_name=localdomain
## Способ хранения данных
# Если false — роль `gluster` НЕ будет монтировать отдельный /dev/sdb и форматировать в XFS (пропустит xfs.yml). 
# Если true, то будет использован отдельный /dev/sdb и форматирован в XFS для хранения данных.
gluster_use_xfs_device=true
# Если gluster_use_xfs_device: true, то bricks использует отдельный /dev/sdb и форматирован в XFS для хранения данных.
gluster_volume_path=/glusterfs/bricks
# Имя тома для GlusterFS
gluster_volume_name=gfs
# Путь монтирования
gluster_mount_path=/mnt/gfs
# Устройство для хранения данных
device2_hdd_dev="/dev/sdb"

# Keepalived VIP for HAProxy
keepalived_vip_cidr=192.168.25.132/24

