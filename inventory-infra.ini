[all:vars]

# Domain used in docker swarm nodes
app_domain_name=infra

cert_manager_certs=[]

## Способ хранения данных Gluster (роль gluster)
# Устройство для хранения данных, например /dev/sdb
# Непустой device2_hdd_dev — отдельный диск: XFS, монтирование в gluster_volume_path/<host>.
# Пустой device2_hdd_dev= — bricks на локальной ФС под gluster_volume_path.
device2_hdd_dev=""
# Путь для томов GlusterFS
gluster_volume_path=/glusterfs/bricks
# Имя тома для GlusterFS
gluster_volume_name=gfs
# Путь монтирования GlusterFS
gluster_mount_path=/mnt/gfs

# Пока нет полного lockdown: порты 22/9090/8080/8443 не закрывать.
firewall_lockdown=false
firewall_trusted_admin_cidrs=[]
# false — ssh с любого IP при lockdown; true — только кластер и admin CIDR
firewall_allow_ssh_only_admin=false
# false — ping с любого IP при lockdown; true — только кластер и admin CIDR
firewall_allow_icmp_only_admin=false

# Keepalived (VIP) for HAProxy:
# Добавьте группу [haproxy] с 1-2 (или более) узлами.
# keepalived_vip_cidr="10.20.10.253/24" - автоматически ставится и настраивается keepalived (+ VRRP в firewall lockdown)
# keepalived_vip_cidr="" — без keepalived и VIP.
keepalived_vip_cidr=""
keepalived_interface="eth0"

#
# mkpasswd --method=SHA-512
# user for ansible
#ansible_user="debian"
#ansible_become_pass=""
#ansible_user="root"
#ansible_ssh_pass=""
ansible_connection="ssh"
# Приватный ключ для SSH (без суффикса .pub). Файл .pub для входа не подходит.
ansible_ssh_private_key_file=~/.ssh/id_ed25519
# Справочно: путь к парному публичному ключу
ansible_ssh_rsa="~/.ssh/id_ed25519.pub"
# cat ~/.ssh/id_rsa.pub
ansible_ssh_key="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL5yX4w/4ydrZBoSpp6XWUq+TnbZODB3lFwAy4an6tnJ aSSa@MS-7D48"