[all:vars]

# Domain used in docker swarm nodes
app_domain_name=localdomain

# cert-manager (certbot + webroot) — получение/обновление Let's Encrypt сертификатов в GFS.
# Режим с HAProxy (без Traefik): HAProxy проксирует `/.well-known/acme-challenge/` в локальный nginx (certbot-web),
# а certbot пишет сертификаты в GFS и обновляет их по расписанию.
cert_manager_enabled=true
cert_manager_deploy_method=compose
cert_manager_domains=[]
cert_manager_enable_traefik_router=false
cert_manager_email=admin@localdomain
cert_manager_publish_http=true
cert_manager_publish_http_port=8088
cert_manager_compose_bind_ip=127.0.0.1
cert_manager_link_to_haproxy_ssl_dir=true
# База: defaults ролей (docker, portainer, traefik, haproxy, gluster, firewall-iptables) + cluster-defaults (напр. default_ssh_port).
# Здесь — домен, Gluster, firewall/keepalived, ACL HAProxy, fail2ban, SSH Ansible. Совпадающие ключи перекрывают defaults.
## Способ хранения данных Gluster (роль gluster)
# Устройство для хранения данных, например /dev/sdb
# Непустой device2_hdd_dev — отдельный диск: XFS, монтирование в gluster_volume_path/<host>.
# Пустой device2_hdd_dev= — bricks на локальной ФС под gluster_volume_path.
device2_hdd_dev="/dev/sdb"
# Путь для томов GlusterFS
gluster_volume_path=/glusterfs/bricks
# Имя тома для GlusterFS
gluster_volume_name=gfs
# Путь монтирования GlusterFS
gluster_mount_path=/mnt/gfs

firewall_lockdown=false
# Пока нет полного lockdown: отдельные скрипты — Swarm, Portainer, Gluster (свои цепочки INPUT); 80/443/22/9090 не трогать.
firewall_restrict_swarm_ports=true
firewall_trusted_admin_cidrs=[]
# false — SSH с любого IP при lockdown; true — только кластер и firewall_trusted_admin_cidrs (в проде часто true + непустые CIDR)
firewall_allow_ssh_only_admin=false

# false — ping с любого IP при lockdown; true — только кластер и admin CIDR
firewall_allow_icmp_only_admin=false

# Keepalived (VIP) for HAProxy:
# Добавьте группу [haproxy] с 1-2 (или более) узлами.
# keepalived_vip_cidr="10.20.10.253/24" автоматически ставится и настраивается keepalived (+ VRRP в firewall lockdown)
# Пусто keepalived_vip_cidr — без keepalived.
keepalived_vip_cidr="192.168.1.53/24"
keepalived_interface="eth0"

haproxy_acl_enabled=true
# Включить роль HAProxy (по умолчанию в defaults она выключена)
haproxy_enabled=true
# Проверка Host (и опционально URI) на haproxy_http_port / haproxy_https_port; пустые regex → *.app_domain_name и app_domain_name
haproxy_allow_host_regex=[]
haproxy_allow_uri_regex=[]

# fail2ban jail по 403 HAProxy в /var/log/haproxy.log
fail2ban_haproxy_enabled=true
fail2ban_bantime=3600
fail2ban_findtime=600
fail2ban_maxretry=10
# Статический ignoreip: [] или [127.0.0.0/8,::1]; к списку всегда добавляются IP нод кластера (+ fail2ban_ignoreip_extra)
fail2ban_ignoreip=[]
fail2ban_ignoreip_extra=[]

