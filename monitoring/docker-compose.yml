version: "3.8"

services:
  grafana:
    image: grafana/grafana-oss:12.4.3
    ports:
      - target: 3000
        published: 19999
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
          - node.labels.monitoring == true
    volumes:
      - type: volume
        source: grafana-data
        target: /var/lib/grafana
    configs:
      - source: grafana-datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana-datasource-loki
        target: /etc/grafana/provisioning/datasources/loki.yml
      - source: grafana-dashboards-provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana-dashboard-vms
        target: /var/lib/grafana/dashboards/swarm/cluster-vms-overview.json
      - source: grafana-dashboard-services
        target: /var/lib/grafana/dashboards/swarm/swarm-services-overview.json
      - source: grafana-dashboard-storage-db
        target: /var/lib/grafana/dashboards/swarm/storage-db-overview.json
      - source: grafana-dashboard-logs
        target: /var/lib/grafana/dashboards/general/stack-logs-overview.json
      - source: grafana-dashboard-bethome-release
        target: /var/lib/grafana/dashboards/general/bethome-release-overview.json
      - source: grafana-dashboard-node-metrics
        target: /var/lib/grafana/dashboards/swarm/node-metrics.json
      - source: grafana-dashboard-container-metrics
        target: /var/lib/grafana/dashboards/swarm/container-metrics.json
      - source: grafana-dashboard-bethome-rabbit-shared
        target: /var/lib/grafana/dashboards/general/bethome-rabbit-shared-services-overview.json
      - source: grafana-dashboard-inhome-rabbit-shared
        target: /var/lib/grafana/dashboards/general/inhome-rabbit-shared-services-overview.json
      - source: grafana-dashboard-frontend-rabbit-shared
        target: /var/lib/grafana/dashboards/general/frontend-rabbit-shared-services-overview.json
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.dvsprtbt.ru/
      - GF_UNIFIED_ALERTING_ENABLED=false
      - GF_ALERTING_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/general/stack-logs-overview.json
    networks:
      - net

  prometheus:
    image: prom/prometheus:v3.11.2
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--log.level=error'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
          - node.labels.monitoring == true
    volumes:
      - type: volume
        source: prometheus-data
        target: /prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    networks:
      - net
      - bethome-network
      - inhome-network

  loki:
    image: grafana/loki:3.6.10
    command:
      - -config.file=/etc/loki/local-config.yaml
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
          - node.labels.monitoring == true
    volumes:
      - type: volume
        source: loki-data
        target: /loki
    configs:
      - source: loki-config
        target: /etc/loki/local-config.yaml
      - source: loki-rules
        target: /etc/loki/rules/stack-alerts.yml
    networks:
      - net

  alertmanager:
    image: prom/alertmanager:v0.32.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
          - node.labels.monitoring == true
    configs:
      - source: alertmanager-config
        target: /etc/alertmanager/alertmanager.yml
    networks:
      - net

  promtail:
    image: grafana/promtail:3.6.10
    command:
      - -config.file=/etc/promtail/config.yml
    deploy:
      mode: global
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
      - type: volume
        source: promtail-data
        target: /tmp
    configs:
      - source: promtail-config
        target: /etc/promtail/config.yml
    networks:
      - net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    command: -logtostderr -docker_only
    deploy:
      mode: global
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    volumes:
      - type: bind
        source: /
        target: /rootfs
        read_only: true
      - type: bind
        source: /var/run
        target: /var/run
        read_only: true
      - type: bind
        source: /sys
        target: /sys
        read_only: true
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
        read_only: true
      - type: bind
        source: /dev/disk
        target: /dev/disk
        read_only: true
    networks:
      - net

  node-exporter:
    image: prom/node-exporter:v1.11.1
    hostname: "{{.Node.Hostname}}"
    command:
      - '--path.sysfs=/host/sys'
      - '--path.procfs=/host/proc'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
      - '--no-collector.ipvs'
    deploy:
      mode: global
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    volumes:
      - type: bind
        source: /
        target: /rootfs
        read_only: true
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
    networks:
      - net

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  promtail-data:

configs:
  prometheus-config:
    file: ./prometheus/prometheus.yml
  grafana-datasource:
    file: ./grafana/provisioning/datasources/prometheus.yml
  grafana-datasource-loki:
    file: ./grafana/provisioning/datasources/loki.yml
  grafana-dashboards-provider:
    file: ./grafana/provisioning/dashboards/dashboards.yml
  grafana-dashboard-vms:
    file: ./grafana/dashboards/cluster-vms-overview.json
  grafana-dashboard-services:
    file: ./grafana/dashboards/swarm-services-overview.json
  grafana-dashboard-storage-db:
    file: ./grafana/dashboards/storage-db-overview.json
  grafana-dashboard-logs:
    file: ./grafana/dashboards/stack-logs-overview.json
  grafana-dashboard-bethome-release:
    file: ./grafana/dashboards/bethome-release-overview.json
  grafana-dashboard-node-metrics:
    file: ./grafana/dashboards/swarm/node-metrics.json
  grafana-dashboard-container-metrics:
    file: ./grafana/dashboards/swarm/container-metrics.json
  grafana-dashboard-bethome-rabbit-shared:
    file: ./grafana/dashboards/general/bethome-rabbit-shared-services-overview.json
  grafana-dashboard-inhome-rabbit-shared:
    file: ./grafana/dashboards/general/inhome-rabbit-shared-services-overview.json
  grafana-dashboard-frontend-rabbit-shared:
    file: ./grafana/dashboards/general/frontend-rabbit-shared-services-overview.json
  loki-config:
    file: ./loki/loki-config.yml
  loki-rules:
    file: ./loki/rules/stack-alerts.yml
  alertmanager-config:
    file: ./alertmanager/alertmanager.yml
  promtail-config:
    file: ./promtail/promtail-config.yml

networks:
  net:
    external: true
    name: monitoring_net
  bethome-network:
    external: true
  inhome-network:
    external: true




