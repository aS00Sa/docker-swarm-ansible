global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    dns_sd_configs:
      - names: ["tasks.cadvisor"]
        type: A
        port: 8080

  - job_name: node-exporter
    dns_sd_configs:
      - names: ["tasks.node-exporter"]
        type: A
        port: 9100

  # RabbitMQ shared native Prometheus endpoint.
  - job_name: rabbitmq-shared-native
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq-shared_rabbitmq-shared:15692"]

  # Redis exporters from infra stacks (keys/memory/ops/hits/misses).
  - job_name: inhome-redis-exporter
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["tasks.inhome-infra_redis-exporter"]
        type: A
        port: 9121

  - job_name: bethome-redis-exporter
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["tasks.bethome-infra_bethome-redis-exporter"]
        type: A
        port: 9121

  # Bethome business metrics are pushed here by services via PUSHGATEWAY_URL.
  - job_name: bethome-pushgateway
    dns_sd_configs:
      - names: ["tasks.bethome-infra_bethome-pushgateway"]
        type: A
        port: 9091

  # Direct scraping of Bethome app services is intentionally disabled:
  # most services do not expose /metrics and generate persistent 404/refused noise.
  # Use Pushgateway series (bethome-pushgateway job) for business metrics instead.

