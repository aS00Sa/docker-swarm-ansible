global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    dns_sd_configs:
      - names: ["tasks.cadvisor"]
        type: A
        port: 8080

  - job_name: node-exporter
    dns_sd_configs:
      - names: ["tasks.node-exporter"]
        type: A
        port: 9100

  # Bethome business metrics are pushed here by services via PUSHGATEWAY_URL.
  - job_name: bethome-pushgateway
    dns_sd_configs:
      - names: ["tasks.bethome-infra_pushgateway"]
        type: A
        port: 9091

  # Direct scraping of Bethome app services exposed on container port 3000.
  - job_name: bethome-services
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - tasks.bethome_server
          - tasks.bethome_betradar-amq
          - tasks.bethome_betradar-http
          - tasks.bethome_betradar-mts
          - tasks.bethome_resulting
          - tasks.bethome_queue-worker
          - tasks.bethome_cache-static
          - tasks.bethome_cache-table
          - tasks.bethome_cache-fast
          - tasks.bethome_cache-bet
          - tasks.bethome_cdn
          - tasks.bethome_stream
          - tasks.bethome_admin
        type: A
        port: 3000

