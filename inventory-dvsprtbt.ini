# Traefik (auto_cert_manager): healthCheck только при true; в .ini только key=value (двоеточие как в YAML — сломает парсер всего файла).
traefik_auto_site_health_check_enabled=true
# Local Traefik mode (avoid /mnt/gfs dependency for this contour)
traefik_deploy_method=compose
traefik_compose_project_dir=/opt/traefik
traefik_dependency_checks_warn_only=true
# Если traefik_default_upstream_host задан, используется он, а не хосты из [test_backend] — это ожидаемо: «один общий IP для всех портов».
#traefik_default_upstream_host=80.237.49.186

## Способ хранения данных Gluster (роль gluster)
# Устройство для хранения данных, например /dev/sdb
# Непустой device2_hdd_dev — отдельный диск: XFS, монтирование в gluster_volume_path/<host>.
# Пустой device2_hdd_dev= — bricks на локальной ФС под gluster_volume_path.
device2_hdd_dev=""
# Путь для томов GlusterFS
gluster_volume_path=/glusterfs/bricks
# Имя тома для GlusterFS
gluster_volume_name=gfs
# Путь монтирования GlusterFS
gluster_mount_path=/mnt/gfs
# Каталоги под bind на GFS: список — playbooks/dynamic/gfs_default_app_bind_paths.yml; прогон — create-gfs-app-dirs-from-dynamic-list.yml

# Docker: Nexus btnxlocal как insecure registry (HTTP к 192.168.25.126). Имя должно резолвиться (DNS или /etc/hosts на нодах).
docker_insecure_registries=["nexus.btnxlocal.ru:9080","nexus.btnxlocal.ru:9081","nexus.btnxlocal.ru:9082","192.168.25.126:9080","192.168.25.126:9081","192.168.25.126:9082"]

# false — без жёсткого lockdown; true — узкие правила iptables (роль firewall-iptables)
firewall_lockdown=false
# Синтаксис как у docker_insecure_registries: одна строка, массив в квадратных скобках, элементы в двойных кавычках.
firewall_trusted_admin_cidrs=["109.195.238.187","172.25.147.160","192.168.0.0/16","172.16.0.0/12","10.0.0.0/8"]
# false — SSH с любого IP при lockdown; true — только кластер и firewall_trusted_admin_cidrs (в проде часто true + непустые CIDR)
firewall_allow_ssh_only_admin=false
# false — ping с любого IP при lockdown; true — только кластер и admin CIDR
firewall_allow_icmp_only_admin=false
#
firewall_restrict_swarm_ports=true
firewall_restrict_portainer_service_ports=true
firewall_restrict_gluster_service_ports=true
firewall_restrict_rpcbind_ports=true

# Keepalived (VIP) for HAProxy:
# Добавьте группу [haproxy] с 1-2 (или более) узлами.
# keepalived_vip_cidr="10.20.10.253/24" автоматически ставится и настраивается keepalived (+ VRRP в firewall lockdown)
# Пусто keepalived_vip_cidr — без keepalived.
keepalived_vip_cidr=""
keepalived_interface="eth0"

#
