---
# Подключение: ansible-playbook ... -e @playbooks/vars/tstsprtbt-business-stacks.yml
# Имена stack и пути compose подставьте под свой контур (ниже — примеры из examples/ репозитория).

swarm_business_stacks:
  - stack: frontend-infra
    compose: examples/frontend-infra/docker-compose.yml
  - stack: bethome-infra
    compose: examples/bethome-infra/docker-compose.yml
  - stack: inhome-infra
    compose: examples/inhome-infra/docker-compose.yml

