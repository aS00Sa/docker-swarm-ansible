docker_packages:
  - docker.io
  - docker-ce-cli
  - containerd
#  - docker-buildx
#  - docker-buildx-plugin
#  - docker-compose-plugin
#  - docker-ce
#  - containerd.io
old_docker_packages:
#  - docker.io
#  - docker-ce-cli
#  - containerd
  - docker-buildx
  - docker-buildx-plugin
  - docker-compose-plugin
  - docker
  - docker-engine
  - docker-cli
  - containerd.io
#  - containerd
  - runc
portainer_admin_port: 9000
portainer_tunnel_port: 8000
portainer_gfs_subdir: portainer_gfs
portainer_network_name: portainer_network
portainer_volume_name: portainer_data
portainer_app_name: portainer_app
portainer_admin_user: admin
portainer_admin_password: portainer1234
portainer_agent_secret: portaineragenttocken
traefik_listen_port: 80
traefik_admin_port: 8080
traefik_network_name: traefik_network
traefik_app_name: traefik_app
traefik_admin_user: traefik_admin
traefik_admin_password: traefik1234
haproxy_stats_user: haproxy_stats
haproxy_stats_password: haproxy1234

# Keepalived (VIP) for HAProxy
# Добавьте в inventory.ini группу [haproxy] с 1-2 (или более) узлами.
keepalived_enabled: true
keepalived_interface: eth0
keepalived_virtual_router_id: 51
keepalived_auth_pass: keepalivedhaproxy
keepalived_priority_master: 150
keepalived_priority_backup: 100
keepalived_garp_delay: 1
keepalived_haproxy_check_interval: 2
