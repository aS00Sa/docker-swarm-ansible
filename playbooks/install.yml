---
- hosts: all
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: host-defaults

- hosts: all
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: generate-certs

- hosts: swarm_managers
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: docker
    - import_role:
        name: swarm-managers

- hosts: swarm_workers
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: docker
    - import_role:
        name: swarm-workers

- hosts: gluster_nodes
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: gluster

- hosts: swarm_managers:swarm_workers
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: gluster-client

- hosts: swarm_nodes
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: swarm-labels

- hosts: swarm_managers
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: portainer

- hosts: traefik
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: traefik

# HAProxy → Traefik на нодах группы [traefik]:traefik_listen_port (после деплоя Traefik).
- hosts: haproxy
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: haproxy

# После публикации сервисов: ограничить ingress (DOCKER-USER раньше DOCKER-INGRESS) и INPUT.
- hosts: swarm_managers:swarm_workers:gluster_nodes
  tasks:
    - include_vars: "{{playbook_dir}}/vars/config.yml"
    - import_role:
        name: firewall-iptables
