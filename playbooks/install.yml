---
# Полный деплой кластера (все стадии по порядку):
#   ansible-playbook -i inventory-prod.ini playbooks/install.yml
# Итеративная отладка без firewall (см. README):
#   ansible-playbook ... playbooks/install.yml --skip-tags firewall-iptables
#
# Одна стадия (быстрее), тот же состав переменных (defaults ролей + cluster-defaults при наличии + inventory):
#   ansible-playbook -i inventory-prod.ini playbooks/plays/10-haproxy.yml
#
# Несколько стадий по тегам (как раньше):
#   ansible-playbook -i inventory-prod.ini playbooks/install.yml --tags haproxy
#   ansible-playbook -i inventory-prod.ini playbooks/install.yml --tags docker,traefik
#
# Произвольная роль по имени (без отдельного файла в plays/):
#   ansible-playbook -i inventory-prod.ini playbooks/run-role.yml -e target_role=haproxy -e target_hosts=haproxy
#
# Плейбуки в plays/ указывают роли путём ../roles/… (работает и когда ansible.cfg из-за world-writable cwd не читается).
- import_playbook: plays/01-host-defaults.yml
- import_playbook: plays/02-generate-certs.yml
- import_playbook: plays/11-firewall-iptables.yml
- import_playbook: plays/03-docker-swarm-managers.yml
- import_playbook: plays/04-docker-swarm-workers.yml
- import_playbook: plays/03b-docker-edge.yml
- import_playbook: plays/05-gluster.yml
- import_playbook: plays/06-gluster-client.yml
- import_playbook: plays/07-swarm-labels.yml
- import_playbook: plays/08-portainer.yml
- import_playbook: plays/09-traefik.yml
- import_playbook: plays/12-cert-manager.yml
- import_playbook: plays/10-haproxy.yml
