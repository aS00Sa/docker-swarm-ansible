# traefik_version: v3.6.10
version: '3.5'

# Вход HTTP(S) для приложений — не порты haproxy_http_port / haproxy_https_port на хосте (их занимает HAProxy).
# Публикация на всех интерфейсах: доступ с нод кластера для балансировки HAProxy по upstream.
# Внутри контейнера: web → traefik_http_port, websecure → traefik_https_port, traefik (API) → traefik_internal_api_port.
services:
  traefik:
    image: traefik:v3.6.10
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    environment:
      TZ: Europe/Moscow
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
      - target: 8443
        published: 8443
        protocol: tcp
        mode: host
      - target: 9082
        published: 9082
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-acme:/etc/traefik
      - /mnt/gfs/traefik_gfs/traefik.yml:/etc/traefik/traefik.yml:ro
      - /mnt/gfs/traefik_gfs/dynamic:/etc/traefik/dynamic:ro
      - traefik_data:/data
    networks:
      - traefik_network
    deploy:
      labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik_app.tstsprtbt.ru`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.middlewares=auth"
      - "traefik.http.routers.api.entrypoints=traefik"
      - "traefik.http.middlewares.auth.basicauth.users=traefik_admin:$$apr1$$WBRyKorq$$aOm1HHbDkLwuam7.CKx571"
      - "traefik.http.services.dummy-svc.loadbalancer.server.port=9999"
      mode: global
      placement:
        constraints: [node.role == manager]

networks:
  traefik_network:
    driver: overlay
    attachable: true
    name: traefik_network

volumes:
  traefik_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/traefik_gfs

  traefik-acme:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/traefik_gfs
