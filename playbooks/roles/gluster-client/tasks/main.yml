---
- name: Detect edge client role (haproxy/traefik)
  ansible.builtin.set_fact:
    gluster_client_is_edge: >-
      {{
        inventory_hostname in (groups['haproxy'] | default([]))
        or inventory_hostname in (groups['traefik'] | default([]))
      }}

- name: Skip gluster-client on edge hosts
  when:
    - gluster_client_is_edge | default(false) | bool
  block:
    - name: Explain why gluster-client is skipped on edge host
      ansible.builtin.debug:
        msg: >-
          Skipping gluster-client on edge host {{ inventory_hostname }}.
          Edge shared storage for cert-manager is handled by dedicated edge-gluster logic
          only when cert_manager_use_shared_storage=true and edge nodes count >= 3.

    - name: End gluster-client play for edge host
      meta: end_host

- name: Install GlusterFS client packages
  become: true
  become_method: sudo
  apt:
    pkg:
      - glusterfs-client
      - glusterfs-common
    state: present
    force_apt_get: true
    update_cache: yes

- name: Verify Gluster mount path
  become: true
  become_method: sudo
  ansible.builtin.command: ls -ld "{{ gluster_mount_path }}"
  register: gluster_mount_path_probe
  changed_when: false
  failed_when: false

- name: Heal stale Gluster mount path endpoint (if needed)
  become: true
  become_method: sudo
  ansible.builtin.shell: >
    umount -l "{{ gluster_mount_path }}" >/dev/null 2>&1 || true;
    mkdir -p "{{ gluster_mount_path }}"
  when: "'Transport endpoint is not connected' in (gluster_mount_path_probe.stderr | default(''))"
  changed_when: false

- name: Ensure Gluster mount path directory exists (idempotent)
  become: true
  become_method: sudo
  ansible.builtin.command:
    argv:
      - mkdir
      - -p
      - "{{ gluster_mount_path }}"
  changed_when: false
  failed_when: false

- name: Ensure Gluster mount path directory exists (redundant safety)
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: "{{ gluster_mount_path }}"
    state: directory

- name: Pick Gluster peer hosts for client mount
  ansible.builtin.set_fact:
    gluster_client_primary_nodes: >-
      {{
        (
          groups['gluster_nodes_bricks']
          if (
            inventory_hostname in (groups['haproxy'] | default([]))
            or inventory_hostname in (groups['traefik'] | default([]))
          )
          else groups['gluster_nodes_bricks']
        )
        | default(groups['gluster_nodes'] | default([]))
        | unique
        | list
      }}
    gluster_client_fallback_nodes: >-
      {{
        (
          groups['gluster_nodes']
          if (
            inventory_hostname in (groups['haproxy'] | default([]))
            or inventory_hostname in (groups['traefik'] | default([]))
          )
          else []
        )
        | default([])
        | unique
        | list
      }}

- name: Ensure Gluster client peer list is not empty
  ansible.builtin.assert:
    that:
      - (gluster_client_primary_nodes | default([]) | length) > 0
    fail_msg: >-
      Gluster client peers list is empty. Define [gluster_nodes] and/or [gluster_nodes_bricks]
      in inventory.

- name: Resolve Gluster peer addresses for client mount
  ansible.builtin.set_fact:
    gluster_client_primary_peers: "{{ (gluster_client_primary_peers | default([])) + [ gluster_peer_addr_resolved ] }}"
  vars:
    gluster_peer_addr_resolved: >-
      {{
        hostvars[item].gluster_peer_addr
          | default(hostvars[item].gluster_client_addr)
          | default(hostvars[item].ansible_host)
          | default(item)
          | default(hostvars[item].ansible_default_ipv4.address)
      }}
  loop: "{{ gluster_client_primary_nodes }}"

- name: Resolve fallback peer addresses for edge NFS mount
  when: (gluster_client_fallback_nodes | default([]) | length) > 0
  ansible.builtin.set_fact:
    gluster_client_fallback_peers: "{{ (gluster_client_fallback_peers | default([])) + [ gluster_peer_addr_resolved ] }}"
  vars:
    gluster_peer_addr_resolved: >-
      {{
        hostvars[item].gluster_peer_addr
          | default(hostvars[item].gluster_client_addr)
          | default(hostvars[item].ansible_host)
          | default(item)
          | default(hostvars[item].ansible_default_ipv4.address)
      }}
  loop: "{{ gluster_client_fallback_nodes }}"

- name: Probe local gluster connectivity for edge nodes (primary peers)
  when: gluster_client_is_edge | default(false) | bool
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: 24007
    timeout: 2
    connect_timeout: 1
    state: started
  loop: "{{ gluster_client_primary_peers | default([]) }}"
  loop_control:
    label: "{{ item }}:24007"
  register: gluster_client_primary_connectivity
  failed_when: false
  changed_when: false

- name: Decide whether edge node should use primary gluster peers
  when: gluster_client_is_edge | default(false) | bool
  ansible.builtin.set_fact:
    gluster_client_use_primary_gluster: >-
      {{
        (gluster_client_primary_connectivity.results | default([]))
        | selectattr('failed', 'defined')
        | rejectattr('failed', 'equalto', true)
        | list
        | length > 0
      }}

- name: Non-edge nodes always use primary gluster peers
  when: not (gluster_client_is_edge | default(false) | bool)
  ansible.builtin.set_fact:
    gluster_client_use_primary_gluster: true

- name: Ensure NFS client package for edge fallback
  when:
    - gluster_client_enable_nfs_fallback | default(true) | bool
    - gluster_client_is_edge | default(false) | bool
  become: true
  become_method: sudo
  ansible.builtin.apt:
    pkg:
      - nfs-common
    state: present
    force_apt_get: true
    update_cache: yes

- name: Check if {{ gluster_mount_path }} already mounted
  become: true
  become_method: sudo
  command: mountpoint -q "{{ gluster_mount_path }}"
  register: gfs_already_mounted
  changed_when: false
  failed_when: false

- name: Mount Gluster volume {{ gluster_volume_name }} to {{ gluster_mount_path }}
  become: true
  become_method: sudo
  shell: >
    timeout 30s mount -t glusterfs
    "{{ gluster_client_primary_peers[0] }}:/{{ gluster_volume_name }}"
    "{{ gluster_mount_path }}"
    -o "defaults,_netdev,transport=tcp,backupvolfile-server={{ gluster_client_primary_peers[1] | default(gluster_client_primary_peers[0]) }}"
  register: mount_try1
  failed_when: false
  when:
    - (gfs_already_mounted.rc | default(1)) != 0
    - gluster_client_use_primary_gluster | default(true) | bool

- name: Debug gluster mount try1 failure (if any)
  when:
    - (gfs_already_mounted.rc | default(1)) != 0
    - (mount_try1.rc | default(0)) != 0
  ansible.builtin.debug:
    msg:
      - "gluster-client mount_try1 rc={{ mount_try1.rc | default('n/a') }}"
      - "gluster-client mount_try1 stderr={{ mount_try1.stderr | default('') }}"
      - "gluster-client mount_try1 stdout={{ mount_try1.stdout | default('') }}"

- name: Fallback mount without backupvolfile-server
  become: true
  become_method: sudo
  when:
    - (gfs_already_mounted.rc | default(1)) != 0
    - mount_try1 is defined
    - (mount_try1.rc | default(1)) != 0
  block:
    - name: Fallback mount without backupvolfile-server (actual mount)
      ansible.builtin.shell: >
        timeout 30s mount -t glusterfs
        "{{ gluster_client_primary_peers[0] }}:/{{ gluster_volume_name }}"
        "{{ gluster_mount_path }}"
        -o "defaults,_netdev,transport=tcp"
      register: mount_try2
      failed_when: false

    - name: Collect glusterfs client logs after mount failure (best-effort)
      when: (mount_try2.rc | default(0)) != 0
      ansible.builtin.shell: |
        set -o pipefail
        echo "=== mount command ==="
        echo 'mount -t glusterfs "{{ gluster_client_primary_peers[0] }}:/{{ gluster_volume_name }}" "{{ gluster_mount_path }}" -o "defaults,_netdev,transport=tcp"'
        echo
        echo "=== /var/log/glusterfs (ls) ==="
        ls -la /var/log/glusterfs 2>&1 || true
        echo
        echo "=== /var/log/glusterfs/* (tail-like) ==="
        for f in /var/log/glusterfs/*.log /var/log/glusterfs/*.txt; do
          [ -e "$f" ] || continue
          echo "--- $f (last 200 lines) ---"
          tail -n 200 "$f" 2>&1 || true
          echo
        done
      args:
        executable: /bin/bash
      register: gluster_client_logs
      changed_when: false
      failed_when: false

- name: Debug gluster mount try2 failure (if any)
  when:
    - (gfs_already_mounted.rc | default(1)) != 0
    - mount_try2 is defined
    - (mount_try2.rc | default(0)) != 0
  ansible.builtin.debug:
    msg:
      - "gluster-client mount_try2 rc={{ mount_try2.rc | default('n/a') }}"
      - "gluster-client mount_try2 stderr={{ mount_try2.stderr | default('') }}"
      - "gluster-client mount_try2 stdout={{ mount_try2.stdout | default('') }}"
      - "gluster-client logs (truncated)=\n{{ gluster_client_logs.stdout | default('') }}"

- name: Fallback mount via NFS Ganesha for edge nodes
  when:
    - gluster_client_enable_nfs_fallback | default(true) | bool
    - gluster_client_is_edge | default(false) | bool
    - (gfs_already_mounted.rc | default(1)) != 0
    - not (gluster_client_use_primary_gluster | default(false) | bool) or (mount_try2 is defined and (mount_try2.rc | default(0)) != 0)
  become: true
  become_method: sudo
  ansible.builtin.shell: |
    umount -l "{{ gluster_mount_path }}" >/dev/null 2>&1 || true
    mkdir -p "{{ gluster_mount_path }}"
    timeout 30s mount -t nfs4 \
      "{{ (gluster_client_fallback_peers | default(gluster_client_primary_peers))[0] }}:{{ gluster_client_nfs_export_path }}" \
      "{{ gluster_mount_path }}" \
      -o "{{ gluster_client_nfs_mount_opts }}"
  register: mount_nfs_fallback
  failed_when: false

- name: Debug NFS fallback mount failure (if any)
  when:
    - mount_nfs_fallback is defined
    - (mount_nfs_fallback.rc | default(0)) != 0
  ansible.builtin.debug:
    msg:
      - "gluster-client nfs_fallback rc={{ mount_nfs_fallback.rc | default('n/a') }}"
      - "gluster-client nfs_fallback stderr={{ mount_nfs_fallback.stderr | default('') }}"
      - "gluster-client nfs_fallback stdout={{ mount_nfs_fallback.stdout | default('') }}"

- name: Verify {{ gluster_mount_path }} is a mountpoint
  become: true
  become_method: sudo
  command: mountpoint -q "{{ gluster_mount_path }}"
  register: gfs_mountpoint
  changed_when: false
  failed_when: false

- name: Warn when Gluster mount is still unavailable (degraded mode)
  when: (gfs_mountpoint.rc | default(1)) != 0
  ansible.builtin.debug:
    msg: >-
      Gluster mount {{ gluster_mount_path }} is not active on this node after retries.
      Continuing in degraded mode (local path may be used by dependent roles).
