---
- name: Install GlusterFS client packages
  become: true
  become_method: sudo
  apt:
    pkg:
      - glusterfs-client
      - glusterfs-common
    state: present
    force_apt_get: true
    update_cache: yes

- name: Verify Gluster mount path
  become: true
  become_method: sudo
  file:
    path: "{{ gluster_mount_path }}"
    state: directory

- name: Mount Gluster volume {{ gluster_volume_name }} to {{ gluster_mount_path }}
  become: true
  become_method: sudo
  mount:
    path: "{{ gluster_mount_path }}"
    src: "{{ groups['gluster_nodes'][0] }}:/{{ gluster_volume_name }}"
    fstype: glusterfs
    opts: "defaults,_netdev,backupvolfile-server={{ groups['gluster_nodes'][1] | default(groups['gluster_nodes'][0]) }}"
    state: mounted

- name: Verify {{ gluster_mount_path }} is a mountpoint
  become: true
  become_method: sudo
  command: mountpoint -q "{{ gluster_mount_path }}"
  register: gfs_mountpoint
  changed_when: false
  failed_when: gfs_mountpoint.rc != 0
