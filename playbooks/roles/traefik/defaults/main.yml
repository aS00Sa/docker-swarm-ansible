---
traefik_http_port: 80
traefik_https_port: 443
traefik_internal_api_port: 9091
traefik_network_name: traefik_network
traefik_app_name: traefik_app
traefik_admin_user: traefik_admin
traefik_admin_password: traefik1234

# Version tag for the Traefik image (per-inventory override is supported)
traefik_version: v3.6.10

# Каталог на общем хранилище GFS под данные Traefik
traefik_gfs_subdir: traefik_gfs

# Подкаталог на GFS с динамическими конфигами Traefik
traefik_dynamic_subdir: dynamic

# Выгружать сгенерированный compose-файл на контроллер (Ansible controller)
traefik_export_stack_local: true

# Режим деплоя Traefik в Swarm: global или replicated.
traefik_deploy_mode: global
# Количество реплик используется только при traefik_deploy_mode=replicated.
traefik_replicas: 1
# Привязка к leader применяется только при replicated и replicas=1.
traefik_pin_to_leader: true

# ACME/Let's Encrypt внутри Traefik.
# В платформенной схеме с HAProxy+cert-manager это должно быть выключено, иначе несколько Traefik инстансов будут конкурировать за renew.
traefik_acme_enabled: false
traefik_acme_email: "admin@{{ app_domain_name }}"
traefik_acme_storage_path: "/etc/traefik/acme.json"
traefik_acme_resolver_name: letsencrypt
