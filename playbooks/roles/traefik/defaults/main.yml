---
traefik_http_port: 8080
traefik_https_port: 8443
traefik_internal_api_port: 9091


traefik_network_name: traefik_network
traefik_app_name: traefik_app
traefik_admin_user: traefik_admin
traefik_admin_password: traefik1234

# Version tag for the Traefik image (per-inventory override is supported)
traefik_version: v3.6.10

# Каталог на общем хранилище GFS под данные Traefik
traefik_gfs_subdir: traefik_gfs

# Подкаталог на GFS с динамическими конфигами Traefik
traefik_dynamic_subdir: dynamic
traefik_dynamic_sites_subdir: sites

# Выгружать сгенерированный compose-файл на контроллер (Ansible controller)
traefik_export_stack_local: true

# Режим деплоя Traefik в Swarm: global или replicated.
traefik_deploy_mode: global
# Количество реплик используется только при traefik_deploy_mode=replicated.
traefik_replicas: 1
# Привязка к leader применяется только при replicated и replicas=1.
traefik_pin_to_leader: true

# Режим деплоя Traefik:
# - auto: если текущий хост в swarm_managers/swarm_workers → stack, иначе → compose
# - stack: docker stack deploy (Swarm)
# - compose: docker compose up -d (одиночный хост без Swarm)
traefik_deploy_method: auto

# Перед деплоем Traefik проверять готовность зависимостей:
# - HAProxy service active на всех хостах группы [haproxy]
# - cert-manager compose имеет хотя бы один running service на хостах [cert_manager]
# Если traefik_dependency_checks_warn_only=true, pre-check не останавливают play
# и выводятся как warning (debug), а не hard fail.
traefik_require_haproxy_ready: true
traefik_require_cert_manager_ready: true
traefik_dependency_checks_warn_only: false

# Явный хост upstream для сайтов из auto_cert_manager.yml.j2, если в cert_manager_certsN не задан upstream_host.
# Пусто — как раньше: hostvars[h].ansible_host по группам [swarm_workers] или [test_backend].
# Пример: белый IP бэкенда, если с edge его маршрутизировать надо на 80.237.49.187, а SSH — ansible_host.
traefik_default_upstream_host: ""

# CORS: список разрешённых Origin (regex) для middleware `cors` в auto_cert_manager.yml.j2.
# Если не задано — поведение как раньше: разрешать все Origin (".*").
# Пример: разрешить только домены проекта и транзитный домен bmd.su:
#   traefik_cors_allow_origin_list_regex:
#     - "^https?://(www\\.)?tstsprtbt\\.ru$"
#     - "^https?://(www\\.)?bmd\\.su$"
traefik_cors_allow_origin_list_regex:
  - ".*"

# CORS: явный список разрешённых Origin (предпочтительнее regex для предсказуемого поведения в браузере).
# Если список пуст — используется traefik_cors_allow_origin_list_regex.
traefik_cors_allow_origin_list: []

# CORS: список разрешённых заголовков для middleware `cors` (по умолчанию общий whitelist).
# Точечно для конкретного сайта можно переопределить в cert_manager_certsN:
#   "cors_allow_headers":["*"]
traefik_cors_allow_headers:
  - Content-Type
  - Authorization
  - Accept
  - X-Requested-With
  - captcha
  - x-idempotency-key
  - X-Idempotency-Key
  - idempotency-key
  - Idempotency-Key

# Каталог проекта для docker compose (deploy_method=compose)
# По умолчанию локальный каталог на ноде Traefik.
traefik_compose_project_dir: "/opt/traefik"

# ACME/Let's Encrypt внутри Traefik.
# В платформенной схеме с HAProxy+cert-manager это должно быть выключено, иначе несколько Traefik инстансов будут конкурировать за renew.
traefik_acme_enabled: false
traefik_acme_email: "admin@{{ app_domain_name }}"
traefik_acme_storage_path: "/etc/traefik/acme.json"
traefik_acme_resolver_name: letsencrypt

# Генерация upstream-сайтов Traefik происходит из cert_manager_certs_effective
# (см. роль cert-manager: tasks/resolve_cert_manager_certs.yml — legacy cert_manager_certs или cert_manager_certs1..N).
# В элементе можно задавать опционально:
# - upstream_servers: ["http://10.0.0.10:8081", "http://10.0.0.11:8081"]
# - upstream_port: 8081
# - upstream_scheme: http
# Traefik (http.services.*.loadBalancer) для auto_cert_manager: passHostHeader + healthCheck.
# Глобально — переменные traefik_auto_site_* ниже; точечно в слоте JSON: pass_host_header,
# health_check_enabled, health_check_path, health_check_interval, health_check_timeout
# (дубли с префиксом traefik_*: traefik_pass_host_header, traefik_health_check_path, …).

# Значения по умолчанию для динамически сгенерированных сайтов (cert_manager_certs* → auto_cert_manager.yml.j2).
traefik_auto_site_pass_host_header: true
# Health check по умолчанию выключен: если путь не отдаёт 2xx (часто нет GET /ping), Traefik снимает все серверы → 503.
# Включите глобально true или в JSON слота: "health_check_enabled":true и при необходимости "health_check_path":"/ping".
traefik_auto_site_health_check_enabled: false
traefik_auto_site_health_check_path: "/ping"
traefik_auto_site_health_check_interval: "10s"
traefik_auto_site_health_check_timeout: "5s"

# Роль рендерит в dynamic/sites/ и синхронизирует в корень dynamic только шаблон auto_cert_manager.yml.j2
# (один YAML на каждый слот cert_manager_certsN). Имя файла — из cert_name: точки → подчёркивания,
# напр. bthm.server... → bthm_server_<domain>_ru.yml (bethome), nhm.* → nhm_* (inhome).
# Отдельных файлов bethome.yml / inhome.yml на GFS нет — см. templates/dynamic/bethome.yml.j2 и inhome.yml.j2
# только как устаревший справочный пример (в tasks не деплоятся, дублировать маршруты нельзя).

# Legacy-монолитные dynamic шаблоны (frontend/frontend-admin/bethome/inhome).
# По умолчанию выключены; включайте только для временной совместимости.
traefik_legacy_dynamic_enabled: false
