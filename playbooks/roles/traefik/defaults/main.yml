---
traefik_http_port: 8080
traefik_https_port: 8443
traefik_internal_api_port: 9091
traefik_network_name: traefik_network
traefik_app_name: traefik_app
traefik_admin_user: traefik_admin
traefik_admin_password: traefik1234

# Version tag for the Traefik image (per-inventory override is supported)
traefik_version: v3.6.10

# Каталог на общем хранилище GFS под данные Traefik
traefik_gfs_subdir: traefik_gfs

# Подкаталог на GFS с динамическими конфигами Traefik
traefik_dynamic_subdir: dynamic

# Выгружать сгенерированный compose-файл на контроллер (Ansible controller)
traefik_export_stack_local: true

# Режим деплоя Traefik в Swarm: global или replicated.
traefik_deploy_mode: global
# Количество реплик используется только при traefik_deploy_mode=replicated.
traefik_replicas: 1
# Привязка к leader применяется только при replicated и replicas=1.
traefik_pin_to_leader: true

# Режим деплоя Traefik:
# - auto: если текущий хост в swarm_managers/swarm_workers → stack, иначе → compose
# - stack: docker stack deploy (Swarm)
# - compose: docker compose up -d (одиночный хост без Swarm)
traefik_deploy_method: auto

# Перед деплоем Traefik проверять готовность зависимостей:
# - HAProxy service active на всех хостах группы [haproxy]
# - cert-manager compose имеет хотя бы один running service на хостах [cert_manager]
# Если traefik_dependency_checks_warn_only=true, pre-check не останавливают play
# и выводятся как warning (debug), а не hard fail.
traefik_require_haproxy_ready: true
traefik_require_cert_manager_ready: true
traefik_dependency_checks_warn_only: false

# Каталог проекта для docker compose (deploy_method=compose)
# По умолчанию размещаем compose-файл на общем GFS рядом с конфигами Traefik.
traefik_compose_project_dir: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}"

# ACME/Let's Encrypt внутри Traefik.
# В платформенной схеме с HAProxy+cert-manager это должно быть выключено, иначе несколько Traefik инстансов будут конкурировать за renew.
traefik_acme_enabled: false
traefik_acme_email: "admin@{{ app_domain_name }}"
traefik_acme_storage_path: "/etc/traefik/acme.json"
traefik_acme_resolver_name: letsencrypt

# Генерация upstream-сайтов Traefik происходит из cert_manager_certs.
# В cert_manager_certs можно задавать опционально:
# - upstream_servers: ["http://10.0.0.10:8081", "http://10.0.0.11:8081"]
# - upstream_port: 8081
# - upstream_scheme: http

# Роль формирует только активные dynamic-конфиги в корне dynamic.
