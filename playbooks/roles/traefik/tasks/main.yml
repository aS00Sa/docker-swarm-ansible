---
- name: Decide effective Traefik deploy method (auto)
  ansible.builtin.set_fact:
    traefik_effective_deploy_method: >-
      {{
        (
          (traefik_deploy_method | default('auto')) == 'auto'
        )
        | ternary(
            (
              inventory_hostname in (
                (groups['swarm_managers'] | default([]))
                + (groups['swarm_workers'] | default([]))
              )
            )
            | ternary('stack', 'compose'),
            (traefik_deploy_method | default('auto'))
          )
      }}

- name: Verify HAProxy is active before Traefik deploy
  when: traefik_require_haproxy_ready | default(true) | bool
  run_once: true
  block:
    - name: Fail if haproxy group is empty (strict mode)
      when:
        - not (traefik_dependency_checks_warn_only | default(false) | bool)
        - (groups['haproxy'] | default([]) | length) == 0
      ansible.builtin.fail:
        msg: "Pre-check failed: inventory group [haproxy] is empty."

    - name: Warn if haproxy group is empty (warn-only mode)
      when:
        - traefik_dependency_checks_warn_only | default(false) | bool
        - (groups['haproxy'] | default([]) | length) == 0
      ansible.builtin.debug:
        msg: "WARNING: pre-check: inventory group [haproxy] is empty."

    - name: Check HAProxy service status on haproxy hosts
      become: true
      become_method: sudo
      ansible.builtin.command: systemctl is-active haproxy
      loop: "{{ groups['haproxy'] | default([]) }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ item }}"
      register: traefik_haproxy_status
      changed_when: false
      failed_when: false

    - name: Initialize list of haproxy hosts not ready
      ansible.builtin.set_fact:
        traefik_haproxy_not_ready_hosts: []

    - name: Append haproxy hosts with non-active status
      ansible.builtin.set_fact:
        traefik_haproxy_not_ready_hosts: "{{ traefik_haproxy_not_ready_hosts + [item.item] }}"
      loop: "{{ traefik_haproxy_status.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('unknown') }}"
      when:
        - (item.rc | default(1)) != 0 or ((item.stdout | default('') | trim) != 'active')

    - name: Fail if HAProxy is not active (strict mode)
      when:
        - not (traefik_dependency_checks_warn_only | default(false) | bool)
        - (traefik_haproxy_not_ready_hosts | default([]) | length) > 0
      ansible.builtin.fail:
        msg: "Pre-check failed: HAProxy is not active on: {{ traefik_haproxy_not_ready_hosts | join(', ') }}"

    - name: Warn if HAProxy is not active (warn-only mode)
      when:
        - traefik_dependency_checks_warn_only | default(false) | bool
        - (traefik_haproxy_not_ready_hosts | default([]) | length) > 0
      ansible.builtin.debug:
        msg: "WARNING: pre-check: HAProxy is not active on: {{ traefik_haproxy_not_ready_hosts | join(', ') }}"

- name: Verify cert-manager compose is running before Traefik deploy
  when: traefik_require_cert_manager_ready | default(true) | bool
  run_once: true
  block:
    - name: Resolve cert-manager compose file path for pre-check
      ansible.builtin.set_fact:
        traefik_cert_manager_compose_file: >-
          {{
            (
              cert_manager_compose_project_dir
              | default(gluster_mount_path ~ '/' ~ (cert_manager_gfs_subdir | default('cert_manager_gfs')))
            ) ~ '/docker-compose.yml'
          }}

    - name: Fail if cert_manager group is empty (strict mode)
      when:
        - not (traefik_dependency_checks_warn_only | default(false) | bool)
        - (groups['cert_manager'] | default([]) | length) == 0
      ansible.builtin.fail:
        msg: "Pre-check failed: inventory group [cert_manager] is empty."

    - name: Warn if cert_manager group is empty (warn-only mode)
      when:
        - traefik_dependency_checks_warn_only | default(false) | bool
        - (groups['cert_manager'] | default([]) | length) == 0
      ansible.builtin.debug:
        msg: "WARNING: pre-check: inventory group [cert_manager] is empty."

    - name: Check running cert-manager services via docker compose
      become: true
      become_method: sudo
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ traefik_cert_manager_compose_file }}"
          - ps
          - --status
          - running
          - --services
      loop: "{{ groups['cert_manager'] | default([]) }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ item }}"
      register: traefik_cert_manager_compose_status
      changed_when: false
      failed_when: false

    - name: Build list of cert-manager hosts not ready
      ansible.builtin.set_fact:
        traefik_cert_manager_not_ready_hosts: >-
          {{
            (
              traefik_cert_manager_compose_status.results
              | default([])
              | rejectattr('rc', 'equalto', 0)
              | map(attribute='item')
              | list
            )
            +
            (
              traefik_cert_manager_compose_status.results
              | default([])
              | selectattr('rc', 'equalto', 0)
              | selectattr('stdout_lines', 'equalto', [])
              | map(attribute='item')
              | list
            )
            | unique
          }}

    - name: Fail if cert-manager compose is not ready (strict mode)
      when:
        - not (traefik_dependency_checks_warn_only | default(false) | bool)
        - (traefik_cert_manager_not_ready_hosts | default([]) | length) > 0
      ansible.builtin.fail:
        msg: >-
          Pre-check failed: cert-manager compose has no running services on:
          {{ traefik_cert_manager_not_ready_hosts | join(', ') }}

    - name: Warn if cert-manager compose is not ready (warn-only mode)
      when:
        - traefik_dependency_checks_warn_only | default(false) | bool
        - (traefik_cert_manager_not_ready_hosts | default([]) | length) > 0
      ansible.builtin.debug:
        msg: >-
          WARNING: pre-check: cert-manager compose has no running services on:
          {{ traefik_cert_manager_not_ready_hosts | join(', ') }}

- name: Verify stacks directory exists (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  file:
    path: "/home/{{ansible_user}}/stacks"
    state: directory

- name: Generate admin password hash
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  shell: echo $(htpasswd -nb {{traefik_admin_user}} {{traefik_admin_password}}) | sed -e s/\\$/\\$\\$/g
  register: traefikpassword

- name: Read Swarm manager statuses (leader-aware placement)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - (traefik_deploy_mode | default('global')) == 'replicated'
    - (traefik_replicas | default(1) | int) == 1
    - traefik_pin_to_leader | default(true) | bool
  command: docker node ls --format '{{ "{{.Hostname}} {{.ManagerStatus}}" }}'
  register: traefik_swarm_managers_status
  changed_when: false

- name: Resolve Traefik placement hostname (leader-aware)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - (traefik_deploy_mode | default('global')) == 'replicated'
    - (traefik_replicas | default(1) | int) == 1
    - traefik_pin_to_leader | default(true) | bool
  ansible.builtin.set_fact:
    traefik_deploy_constraint_hostname: >-
      {{
        (
          traefik_swarm_managers_status.stdout_lines
          | default([])
          | select('search', ' Leader')
          | list
          | first
          | default('')
        ).split(' ')[0]
      }}

- name: Create docker-compose stack file (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  template:
    src: traefik-stack.j2
    dest: /home/{{ansible_user}}/stacks/traefik-stack.yml
    mode: 0775

- name: Ensure Traefik data dir exists on GFS (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  file:
    path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}"
    state: directory
    mode: "0775"

- name: Ensure Traefik dynamic dir exists on GFS (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  file:
    path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}"
    state: directory
    mode: "0775"

- name: Ensure Traefik ACME storage file exists with strict mode (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  copy:
    content: ""
    dest: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/acme.json"
    force: false
    mode: "0600"
    owner: root
    group: root

- name: Deploy per-site Traefik dynamic config to GFS (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - (cert_manager_certs | default([]) | select('mapping') | list | length) > 0
  become: true
  become_method: sudo
  template:
    src: dynamic/auto_cert_manager.yml.j2
    dest: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}/{{ (item.cert_name | default(item.domains | first)) | regex_replace('[^A-Za-z0-9_.-]', '_') | replace('.', '_') }}.yml"
    mode: "0644"
    owner: root
    group: root
  loop: "{{ cert_manager_certs | default([]) | select('mapping') | list }}"
  loop_control:
    label: "{{ item.cert_name | default(item.domains | first) }}"
  vars:
    cert_item: "{{ item }}"

- name: Remove legacy generated dynamic file names (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}/{{ item }}"
    state: absent
  loop:
    - generated-upstreams.yml
    - auto_tls_from_cert_manager.yml

- name: Remove legacy per-site active/example files in dynamic/sites (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}/{{ traefik_dynamic_sites_subdir | default('sites') }}/{{ (item.0.cert_name | default(item.0.domains | first)) | regex_replace('[^A-Za-z0-9_.-]', '_') | replace('.', '_') }}{{ item.1 }}"
    state: absent
  loop: "{{ (cert_manager_certs | default([]) | select('mapping') | list) | product(['.yml', '.example.yml']) | list }}"
  loop_control:
    label: "{{ (item.0.cert_name | default(item.0.domains | first)) ~ item.1 }}"


- name: Create Traefik static configuration on GFS
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  template:
    src: traefik.yml.j2
    dest: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/traefik.yml"
    mode: "0644"
    owner: root
    group: root
  register: traefik_static_config

- name: Export traefik stack deploy compose to GFS (docker-compose.yml)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  template:
    src: traefik-stack.j2
    dest: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/docker-compose.yml"
    mode: "0644"
    owner: root
    group: root

# Деплой через CLI с --detach: не ждём сходимости задач Swarm (в отличие от docker_stack без detach в старых community.docker).
# Идемпотентность/diff spec как у модуля — нет; нужен Docker CLI с поддержкой stack deploy --detach (типично 19.03+).
- name: Deploy stack from a compose file (on first swarm node)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  block:
    - name: Deploy Traefik stack (first attempt)
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --detach
          - -c
          - /home/{{ ansible_user }}/stacks/traefik-stack.yml
          - traefik
      register: traefik_stack_deploy_attempt1
      changed_when: false
      failed_when: traefik_stack_deploy_attempt1.rc != 0
  rescue:
    - name: Remove Traefik stack on mode-change conflict
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - rm
          - traefik
      register: traefik_stack_rm
      failed_when: false
      changed_when: traefik_stack_rm.rc == 0

    - name: Wait for Traefik services to be removed
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ls
          - --format
          - '{{ "{{.Name}}" }}'
      register: traefik_services_after_rm
      changed_when: false
      retries: 24
      delay: 5
      until: "'traefik_traefik' not in traefik_services_after_rm.stdout"

    - name: Deploy Traefik stack (second attempt after recreate)
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --detach
          - -c
          - /home/{{ ansible_user }}/stacks/traefik-stack.yml
          - traefik
      register: traefik_stack_deploy_attempt2
      changed_when: false
      failed_when: traefik_stack_deploy_attempt2.rc != 0

- name: Force Traefik restart (apply static config)
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - traefik_static_config.changed
  become: true
  become_method: sudo
  shell: docker service update --force traefik_traefik

- name: Ensure local generated directory exists
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default('')) and traefik_export_stack_local | default(true)
  delegate_to: localhost
  run_once: true
  file:
    path: "{{ playbook_dir }}/../generated"
    state: directory
    mode: "0755"

- name: Export traefik-stack.yml to controller
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default('')) and traefik_export_stack_local | default(true)
  fetch:
    src: /home/{{ansible_user}}/stacks/traefik-stack.yml
    dest: "{{ playbook_dir }}/../generated/"
    flat: true

- name: Export resulting traefik.yml to controller
  when:
    - (traefik_effective_deploy_method | default('stack')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default('')) and traefik_export_stack_local | default(true)
  fetch:
    src: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/traefik.yml"
    dest: "{{ playbook_dir }}/../generated/traefik.yml"
    flat: true

- name: Deploy Traefik via docker compose (non-swarm)
  when: (traefik_effective_deploy_method | default('stack')) == 'compose'
  become: true
  become_method: sudo
  block:
    - name: Ensure Traefik data dir exists on GFS (compose)
      ansible.builtin.file:
        path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}"
        state: directory
        mode: "0775"

    - name: Ensure Traefik dynamic dir exists on GFS (compose)
      ansible.builtin.file:
        path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}"
        state: directory
        mode: "0775"

    - name: Deploy per-site Traefik dynamic config to GFS (compose)
      when: (cert_manager_certs | default([]) | select('mapping') | list | length) > 0
      ansible.builtin.template:
        src: dynamic/auto_cert_manager.yml.j2
        dest: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}/{{ (item.cert_name | default(item.domains | first)) | regex_replace('[^A-Za-z0-9_.-]', '_') | replace('.', '_') }}.yml"
        mode: "0644"
        owner: root
        group: root
      loop: "{{ cert_manager_certs | default([]) | select('mapping') | list }}"
      loop_control:
        label: "{{ item.cert_name | default(item.domains | first) }}"
      vars:
        cert_item: "{{ item }}"

    - name: Remove legacy generated dynamic file names (compose)
      ansible.builtin.file:
        path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}/{{ item }}"
        state: absent
      loop:
        - generated-upstreams.yml
        - auto_tls_from_cert_manager.yml

    - name: Remove legacy per-site active/example files in dynamic/sites (compose)
      ansible.builtin.file:
        path: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/{{ traefik_dynamic_subdir }}/{{ traefik_dynamic_sites_subdir | default('sites') }}/{{ (item.0.cert_name | default(item.0.domains | first)) | regex_replace('[^A-Za-z0-9_.-]', '_') | replace('.', '_') }}{{ item.1 }}"
        state: absent
      loop: "{{ (cert_manager_certs | default([]) | select('mapping') | list) | product(['.yml', '.example.yml']) | list }}"
      loop_control:
        label: "{{ (item.0.cert_name | default(item.0.domains | first)) ~ item.1 }}"


    - name: Create Traefik static configuration on GFS (compose)
      ansible.builtin.template:
        src: traefik.yml.j2
        dest: "{{ gluster_mount_path }}/{{ traefik_gfs_subdir }}/traefik.yml"
        mode: "0644"
        owner: root
        group: root

    - name: Ensure Traefik compose project dir exists
      ansible.builtin.file:
        path: "{{ traefik_compose_project_dir | default('/opt/traefik') }}"
        state: directory
        mode: "0775"

    - name: Render traefik docker-compose.yml
      ansible.builtin.template:
        src: traefik-compose.yml.j2
        dest: "{{ traefik_compose_project_dir | default('/opt/traefik') }}/docker-compose.yml"
        mode: "0644"

    - name: Start/Update Traefik with docker compose
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ traefik_compose_project_dir | default('/opt/traefik') }}/docker-compose.yml"
          - up
          - -d
      changed_when: false
