---
- name: Install HAProxy
  become: true
  become_method: sudo
  apt:
    pkg:
      - haproxy
    state: latest
    force_apt_get: true
    update_cache: yes

- name: Create HAProxy config file
  become: true
  become_method: sudo
  template:
    src: haproxy.j2
    dest: /etc/haproxy/haproxy.cfg
    backup: yes
    owner: root
    group: root
    mode: '0600'

- name: Validate HAProxy configuration
  become: true
  become_method: sudo
  command: haproxy -c -f /etc/haproxy/haproxy.cfg
  register: haproxy_validate

- name: Restart HAProxy service
  become: true
  become_method: sudo
  systemd:
    name: haproxy
    enabled: yes
    state: restarted

- name: Install keepalived (VIP for HAProxy failover)
  become: true
  become_method: sudo
  apt:
    pkg:
      - keepalived
    state: latest
    force_apt_get: true
    update_cache: yes
  when: keepalived_enabled | default(true)

- name: Create keepalived config
  become: true
  become_method: sudo
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    backup: yes
    owner: root
    group: root
    mode: '0644'
  when: keepalived_enabled | default(true)

- name: Restart keepalived service
  become: true
  become_method: sudo
  systemd:
    name: keepalived
    enabled: yes
    state: restarted
  when: keepalived_enabled | default(true)
