---
- name: Install rsyslog (лог HAProxy в файл для fail2ban)
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: false
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Настроить rsyslog → /var/log/haproxy.log
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: rsyslog-haproxy.conf.j2
    dest: /etc/rsyslog.d/49-haproxy-ansible.conf
    mode: "0644"
  when: fail2ban_haproxy_enabled | default(false) | bool
  register: haproxy_rsyslog_conf

- name: Перезапустить rsyslog
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted
  when:
    - fail2ban_haproxy_enabled | default(false) | bool
    - haproxy_rsyslog_conf is changed

- name: Install HAProxy
  become: true
  become_method: sudo
  ansible.builtin.apt:
    pkg:
      - haproxy
    state: latest
    force_apt_get: true
    update_cache: true

# NOTE: ранее генерировали per-site backend include-файлы из cert_manager_certs.
# Сейчас HAProxy всегда апстримит до Traefik (default_backend) без per-domain правил;
# маршрутизацию по доменам выполняет Traefik (dynamic config).

- name: CIDR для HAProxy /stats (только при firewall_lockdown и непустом firewall_trusted_admin_cidrs из inventory)
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: haproxy-stats-trusted.cidr.j2
    dest: /etc/haproxy/stats-trusted.cidr
    owner: root
    group: haproxy
    mode: "0640"
  when:
    - firewall_lockdown | default(false) | bool
    - >-
      (
        (firewall_trusted_admin_cidrs | default([]))
        | map('trim') | reject('equalto', '') | list | unique | length
      ) > 0

- name: Удалить stats-trusted.cidr (lockdown выкл. или список CIDR пуст)
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: /etc/haproxy/stats-trusted.cidr
    state: absent
  when: >-
    not (firewall_lockdown | default(false) | bool)
    or (
      (firewall_trusted_admin_cidrs | default([]))
      | map('trim') | reject('equalto', '') | list | unique | length
    ) == 0

- name: Decide if HAProxy 443 frontend should be enabled
  ansible.builtin.set_fact:
    haproxy_https_enabled: true

- name: Create HAProxy config file
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: haproxy.j2
    dest: /etc/haproxy/haproxy.cfg
    backup: true
    owner: root
    group: root
    mode: "0600"

- name: Validate HAProxy configuration
  become: true
  become_method: sudo
  ansible.builtin.command: haproxy -c -f /etc/haproxy/haproxy.cfg
  changed_when: false
  when: haproxy_service_enabled | default(true) | bool

- name: Restart HAProxy
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: restarted
  when: haproxy_service_enabled | default(true) | bool

- name: Stop and disable HAProxy service (temporary mode)
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: haproxy
    enabled: false
    state: stopped
  when: not (haproxy_service_enabled | default(true) | bool)

- name: Инициализировать список IP для fail2ban ignoreip
  ansible.builtin.set_fact:
    _fail2ban_cluster_ips: []
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Добавить IP нод swarm/gluster в fail2ban ignoreip
  ansible.builtin.set_fact:
    _fail2ban_cluster_ips: "{{ _fail2ban_cluster_ips + [ hostvars[item].ansible_host | default(item) ] }}"
  loop: "{{ ((groups['swarm_nodes'] | default([])) + (groups['gluster_nodes'] | default([]))) | unique | list }}"
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Install fail2ban
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: false
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Filter fail2ban для HAProxy 403
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: filter-haproxy-forbidden.conf.j2
    dest: /etc/fail2ban/filter.d/haproxy-forbidden.conf
    mode: "0644"
  when: fail2ban_haproxy_enabled | default(false) | bool
  register: haproxy_f2b_filter

- name: Jail fail2ban для HAProxy
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: jail-haproxy-forbidden.conf.j2
    dest: /etc/fail2ban/jail.d/haproxy-forbidden.local
    mode: "0644"
  when: fail2ban_haproxy_enabled | default(false) | bool
  register: haproxy_f2b_jail

- name: Restart fail2ban
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
  when:
    - fail2ban_haproxy_enabled | default(false) | bool
    - haproxy_f2b_filter is changed or haproxy_f2b_jail is changed

- name: Ensure fail2ban enabled and running
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Install keepalived (VIP for HAProxy failover)
  become: true
  become_method: sudo
  ansible.builtin.apt:
    pkg:
      - keepalived
    state: latest
    force_apt_get: true
    update_cache: true
  when: (keepalived_vip_cidr | default('') | trim | length) > 0

- name: Create keepalived config
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  when: (keepalived_vip_cidr | default('') | trim | length) > 0

- name: Restart keepalived service
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: keepalived
    enabled: true
    state: restarted
  when: (keepalived_vip_cidr | default('') | trim | length) > 0
