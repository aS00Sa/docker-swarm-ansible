---
- name: Install rsyslog (лог HAProxy в файл для fail2ban)
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: false
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Настроить rsyslog → /var/log/haproxy.log
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: rsyslog-haproxy.conf.j2
    dest: /etc/rsyslog.d/49-haproxy-ansible.conf
    mode: "0644"
  when: fail2ban_haproxy_enabled | default(false) | bool
  register: haproxy_rsyslog_conf

- name: Перезапустить rsyslog
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted
  when:
    - fail2ban_haproxy_enabled | default(false) | bool
    - haproxy_rsyslog_conf is changed

- name: Install HAProxy
  become: true
  become_method: sudo
  ansible.builtin.apt:
    pkg:
      - haproxy
    state: latest
    force_apt_get: true
    update_cache: true

- name: Ensure HAProxy upstream includes dir exists
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: "{{ haproxy_upstreams_include_dir | default('/etc/haproxy/upstreams') }}"
    state: directory
    mode: "0755"

- name: Ensure HAProxy upstream placeholder include exists
  become: true
  become_method: sudo
  ansible.builtin.copy:
    dest: "{{ haproxy_upstreams_include_dir | default('/etc/haproxy/upstreams') }}/00-placeholder.cfg"
    content: |
      # Managed by Ansible: placeholder for include glob
    mode: "0644"

- name: Render HAProxy upstream backends from cert_manager_certs (Traefik)
  when:
    - haproxy_generate_upstreams_from_cert_manager_certs | default(true) | bool
    - (cert_manager_certs | default([]) | length) > 0
    - >-
      (
        (haproxy_upstream_mode | default('auto')) == 'traefik'
        and ((groups['traefik'] | default([])) | length) > 0
      )
      or
      (
        (haproxy_upstream_mode | default('auto')) == 'auto'
        and ((groups['traefik'] | default([])) | length) > 0
        and (inventory_hostname in (groups['traefik'] | default([])))
        and (
          ((groups['swarm_managers'] | default([])) | length)
          + ((groups['swarm_workers'] | default([])) | length)
        ) > 0
      )
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: upstreams/cert-manager-site-backend.cfg.j2
    dest: >-
      {{
        (haproxy_upstreams_include_dir | default('/etc/haproxy/upstreams'))
        ~ '/10-traefik-' ~ ((item.cert_name | default(item.domains | first)) | regex_replace('[^A-Za-z0-9_.-]', '_') | replace('.', '_'))
        ~ '.cfg'
      }}
    mode: "0644"
  loop: "{{ cert_manager_certs | default([]) }}"
  loop_control:
    label: "{{ item.cert_name | default(item.domains | first) }}"
  vars:
    backend_name_http: >-
      {{
        'bk_traefik_http_'
        ~ ((item.cert_name | default(item.domains | first)) | regex_replace('[^A-Za-z0-9_.-]', '_') | replace('.', '_'))
      }}
    backend_name_https: >-
      {{
        'bk_traefik_https_'
        ~ ((item.cert_name | default(item.domains | first)) | regex_replace('[^A-Za-z0-9_.-]', '_') | replace('.', '_'))
      }}

- name: CIDR для HAProxy /stats (только при firewall_lockdown и непустом firewall_trusted_admin_cidrs из inventory)
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: haproxy-stats-trusted.cidr.j2
    dest: /etc/haproxy/stats-trusted.cidr
    owner: root
    group: haproxy
    mode: "0640"
  when:
    - firewall_lockdown | default(false) | bool
    - >-
      (
        (firewall_trusted_admin_cidrs | default([]))
        | map('trim') | reject('equalto', '') | list | unique | length
      ) > 0

- name: Удалить stats-trusted.cidr (lockdown выкл. или список CIDR пуст)
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: /etc/haproxy/stats-trusted.cidr
    state: absent
  when: >-
    not (firewall_lockdown | default(false) | bool)
    or (
      (firewall_trusted_admin_cidrs | default([]))
      | map('trim') | reject('equalto', '') | list | unique | length
    ) == 0

- name: Check TLS cert files exist for HAProxy HTTPS bind
  become: true
  become_method: sudo
  ansible.builtin.stat:
    follow: true
    path: "{{ item }}"
  register: haproxy_tls_files
  loop:
    - "{{ haproxy_ssl_fullchain_path | default('/etc/ssl/' ~ app_domain_name ~ '/fullchain.pem') }}"
    - "{{ haproxy_ssl_privkey_path | default('/etc/ssl/' ~ app_domain_name ~ '/privkey.pem') }}"

- name: Decide if HAProxy HTTPS frontend should be enabled
  ansible.builtin.set_fact:
    haproxy_https_enabled: >-
      {{
        (haproxy_tls_files.results | map(attribute='stat.exists') | select('equalto', false) | list | length) == 0
      }}

- name: Warn when HAProxy HTTPS is temporarily disabled (TLS files missing)
  when: not (haproxy_https_enabled | default(false) | bool)
  ansible.builtin.debug:
    msg: >-
      TLS файлы отсутствуют, запускаю HAProxy только с HTTP (frontend https_in отключён).
      Ожидаемые файлы:
      {{ haproxy_ssl_fullchain_path | default('/etc/ssl/' ~ app_domain_name ~ '/fullchain.pem') }},
      {{ haproxy_ssl_privkey_path | default('/etc/ssl/' ~ app_domain_name ~ '/privkey.pem') }}.

- name: Create HAProxy config file
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: haproxy.j2
    dest: /etc/haproxy/haproxy.cfg
    backup: true
    owner: root
    group: root
    mode: "0600"

- name: Validate HAProxy configuration
  become: true
  become_method: sudo
  ansible.builtin.command: haproxy -c -f /etc/haproxy/haproxy.cfg
  changed_when: false
  when: haproxy_service_enabled | default(true) | bool

- name: Restart HAProxy
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: restarted
  when: haproxy_service_enabled | default(true) | bool

- name: Stop and disable HAProxy service (temporary mode)
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: haproxy
    enabled: false
    state: stopped
  when: not (haproxy_service_enabled | default(true) | bool)

- name: Инициализировать список IP для fail2ban ignoreip
  ansible.builtin.set_fact:
    _fail2ban_cluster_ips: []
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Добавить IP нод swarm/gluster в fail2ban ignoreip
  ansible.builtin.set_fact:
    _fail2ban_cluster_ips: "{{ _fail2ban_cluster_ips + [ hostvars[item].ansible_host | default(item) ] }}"
  loop: "{{ ((groups['swarm_nodes'] | default([])) + (groups['gluster_nodes'] | default([]))) | unique | list }}"
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Install fail2ban
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: false
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Filter fail2ban для HAProxy 403
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: filter-haproxy-forbidden.conf.j2
    dest: /etc/fail2ban/filter.d/haproxy-forbidden.conf
    mode: "0644"
  when: fail2ban_haproxy_enabled | default(false) | bool
  register: haproxy_f2b_filter

- name: Jail fail2ban для HAProxy
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: jail-haproxy-forbidden.conf.j2
    dest: /etc/fail2ban/jail.d/haproxy-forbidden.local
    mode: "0644"
  when: fail2ban_haproxy_enabled | default(false) | bool
  register: haproxy_f2b_jail

- name: Restart fail2ban
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
  when:
    - fail2ban_haproxy_enabled | default(false) | bool
    - haproxy_f2b_filter is changed or haproxy_f2b_jail is changed

- name: Ensure fail2ban enabled and running
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: fail2ban_haproxy_enabled | default(false) | bool

- name: Install keepalived (VIP for HAProxy failover)
  become: true
  become_method: sudo
  ansible.builtin.apt:
    pkg:
      - keepalived
    state: latest
    force_apt_get: true
    update_cache: true
  when: (keepalived_vip_cidr | default('') | trim | length) > 0

- name: Create keepalived config
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  when: (keepalived_vip_cidr | default('') | trim | length) > 0

- name: Restart keepalived service
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: keepalived
    enabled: true
    state: restarted
  when: (keepalived_vip_cidr | default('') | trim | length) > 0
