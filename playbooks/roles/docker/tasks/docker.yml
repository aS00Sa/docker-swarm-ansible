- name: Check current Docker version
  command: docker --version
  register: current_docker_version
  changed_when: false
  failed_when: false

- name: Parse current Docker version
  set_fact:
    current_docker_installed: "{{ current_docker_version.stdout is defined and current_docker_version.stdout != '' }}"

- name: Compute if Docker install is needed (convenience script)
  ansible.builtin.set_fact:
    docker_force_reinstall: "{{ docker_force_reinstall | default(false) | bool }}"
    docker_install_needed: >-
      {{
        (not current_docker_installed)
        or (docker_force_reinstall | default(false) | bool)
      }}

- name: Install Docker using get.docker.com convenience script
  when: docker_install_needed
  become: true
  become_method: sudo
  block:
    - name: Ensure curl and CA certs are present
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: yes
        lock_timeout: 180

    - name: Download get.docker.com installer script
      ansible.builtin.get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: "0700"
        force: true

    - name: Run get.docker.com installer
      ansible.builtin.command: /bin/sh /tmp/get-docker.sh
      register: docker_installed
      changed_when: true

  always:
    - name: Remove get.docker.com installer script
      ansible.builtin.file:
        path: /tmp/get-docker.sh
        state: absent

- name: Add current user to docker group
  become: true
  become_method: sudo
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  when: docker_install_needed

- name: Verify Docker installation
  command: docker --version
  register: final_docker_version
  changed_when: false

- name: Display final Docker version
  debug:
    msg: "Docker version installed: {{ final_docker_version.stdout }}"

- name: Optional /etc/hosts for insecure registry FQDNs
  ansible.builtin.import_tasks: insecure_registries_etc_hosts.yml

