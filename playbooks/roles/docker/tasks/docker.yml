- name: Check current Docker version
  command: docker --version
  register: current_docker_version
  ignore_errors: yes
  changed_when: false

- name: Parse current Docker version
  set_fact:
    current_docker_installed: "{{ current_docker_version.stdout is defined and current_docker_version.stdout != '' }}"
    current_version_clean: "{{ current_docker_version.stdout | regex_replace('^Docker version (\\d+\\.\\d+\\.\\d+).*', '\\1') if current_docker_version.stdout is defined else '' }}"

- name: Debug version info
  debug:
    msg:
      - "Target Docker version: {{ target_docker_version }}"
      - "Current Docker version: {{ current_version_clean }}"
      - "Docker installed: {{ current_docker_installed }}"

- name: Update apt package index
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: not current_docker_installed or current_version_clean != target_docker_version

- name: Remove old Docker packages if version mismatch
  become: true
  become_method: sudo
  apt:
    state: absent
    pkg: "{{ old_docker_packages }}"
    force_apt_get: true
    purge: yes
    autoremove: yes
  when: current_docker_installed and current_version_clean != target_docker_version
  register: docker_removed

- name: Download Docker GPG key
  become: true
  become_method: sudo
  shell: |
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
    
- name: Set correct permissions on GPG key
  become: true
  become_method: sudo
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'
    
- name: Remove old Docker repository file
  become: true
  become_method: sudo
  file:
    path: /etc/apt/sources.list.d/download_docker_com_linux_debian.list
    state: absent
    
- name: Add correct Docker repository with GPG key
  become: true
  become_method: sudo
  apt_repository:
    repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker.list
    update_cache: yes
  register: apt_result
  until: apt_result is succeeded
  retries: 3
  delay: 5

