- name: Configure Docker container log rotation
  become: true
  become_method: sudo
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
    backup: yes
  register: docker_daemon_log_rotation
  when: docker_enable_log_rotation | default(true)

# После невалидного daemon.json systemd помечает сервис failed и даёт «start request repeated too quickly».
- name: Clear systemd failed state for docker before restart
  ansible.builtin.command: systemctl reset-failed docker
  become: true
  become_method: sudo
  failed_when: false
  changed_when: false
  when:
    - docker_enable_log_rotation | default(true)
    - docker_daemon_log_rotation.changed

- name: Restart Docker after daemon log config change
  become: true
  become_method: sudo
  systemd:
    name: docker
    state: restarted
    daemon_reload: true
  when:
    - docker_enable_log_rotation | default(true)
    - docker_daemon_log_rotation.changed

- name: Configure logrotate for Docker container logs
  become: true
  become_method: sudo
  template:
    src: docker.logrotate.conf.j2
    dest: /etc/logrotate.d/docker.conf
    owner: root
    group: root
    mode: '0644'
    backup: yes
  when: docker_enable_log_rotation | default(true)

#- name: Copy docker.service to host
#  become: true
#  become_method: sudo
#  template:
#    src: docker.service.j2
#    dest: /lib/systemd/system/docker.service
#    mode: '0640'

- name: Ensure Docker service is started and enabled
  become: true
  become_method: sudo
  systemd:
    name: docker
    state: started
    enabled: yes
    daemon_reload: true
