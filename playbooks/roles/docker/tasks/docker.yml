- name: Install Docker
  become: true
  become_method: sudo
  apt:
    pkg:
      - docker.io
      - containerd
    state: present
    force_apt_get: true
    update_cache: yes

#- name: Install Docker Python library
#  become: true
#  become_method: sudo
#  pip:
#    name: docker

- name: Ensure docker group exists
  become: true
  become_method: sudo
  group:
    name: docker
    state: present

- name: Add "{{ansible_user}}" user to "docker" group
  become: true
  become_method: sudo
  user:
    name: debian
    groups: docker
    append: yes

#- name: Waiting for Docker service to become available
#  wait_for:
#    path: /var/run/docker.sock

- name: Copy config.json to host
  become: true
  become_method: sudo
  template:
    src: config.json.j2
    dest: /etc/docker/config.json
    mode: '0640'

- name: Copy daemon.json to host
  become: true
  become_method: sudo
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: '0640'

- name: Copy docker.service to host
  become: true
  become_method: sudo
  template:
    src: docker.service.j2
    dest: /lib/systemd/system/docker.service
    mode: '0640'

- name: Ensure docker deamon restarting
  become: true
  become_method: sudo
  service:
    name: docker
    state: started
    daemon_reload: true
