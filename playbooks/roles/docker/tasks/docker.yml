- name: Update apt package index after removal
  become: true
  become_method: sudo
  apt:
    update_cache: yes
  when: docker_removed is defined and docker_removed.changed

- name: Install specific Docker version
  become: true
  become_method: sudo
  apt:
    name: "{{ item }}={{ target_docker_version }}*"
    state: present
    update_cache: yes
  loop: "{{ docker_packages }}"
#    - docker-ce
#    - docker-ce-cli
#    - containerd.io
  when: not current_docker_installed or current_version_clean != target_docker_version
  register: docker_installed

#- name: Install Docker plugins (latest versions)
#  apt:
#    name:
#      - docker-buildx-plugin
#      - docker-compose-plugin
#    state: present
#  when: not current_docker_installed or current_version_clean != target_docker_version

- name: Install docker Python library
  become: true
  become_method: sudo
#  pip:
#    name: docker
  apt:
    name: "python3-docker"
    state: present
    update_cache: yes

- name: Add current user to docker group
  become: true
  become_method: sudo
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  when: not current_docker_installed or current_version_clean != target_docker_version or docker_installed.changed

- name: Verify Docker installation
  command: docker --version
  register: final_docker_version
  changed_when: false

- name: Display final Docker version
  debug:
    msg: "Docker version installed: {{ final_docker_version.stdout }}"

- name: Copy config.json to host
  become: true
  become_method: sudo
  template:
    src: config.json.j2
    dest: /etc/docker/config.json
    mode: '0640'

- name: Copy daemon.json to host
  become: true
  become_method: sudo
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: '0640'

- name: Copy docker.service to host
  become: true
  become_method: sudo
  template:
    src: docker.service.j2
    dest: /lib/systemd/system/docker.service
    mode: '0640'

- name: Start and enable Docker service
  become: true
  become_method: sudo
  systemd:
    name: docker
    state: started
    enabled: yes
    daemon_reload: true
#  when: not current_docker_installed or current_version_clean != target_docker_version or docker_installed.changed

