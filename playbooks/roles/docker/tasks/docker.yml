- name: Remove prevous versions of Docker
  become: true
  become_method: sudo
  apt:
    state: absent
    pkg:
      - docker
      - docker-engine
      - docker.io
      - docker-cli
      - containerd.io
      - containerd
      - runc
    force_apt_get: true

- name: Download Docker GPG key
  become: true
  become_method: sudo
  shell: |
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
    
- name: Set correct permissions on GPG key
  become: true
  become_method: sudo
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'
    
- name: Remove old Docker repository file
  become: true
  become_method: sudo
  file:
    path: /etc/apt/sources.list.d/download_docker_com_linux_debian.list
    state: absent
    
- name: Add correct Docker repository with GPG key
  become: true
  become_method: sudo
  apt_repository:
    repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker.list
    update_cache: yes
  register: apt_result
  until: apt_result is succeeded
  retries: 3
  delay: 5

