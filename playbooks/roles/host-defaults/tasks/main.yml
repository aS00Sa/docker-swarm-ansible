---
- name: Build unified gluster host pool for numbering
  ansible.builtin.set_fact:
    host_defaults_gluster_hosts: >-
      {{
        groups['gluster_nodes_bricks'] | default([]) | list
      }}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Build service role with haproxy/traefik priority
  ansible.builtin.set_fact:
    host_defaults_svc_role: >-
      {%- set _in_haproxy = inventory_hostname in (groups['haproxy'] | default([])) -%}
      {%- set _in_traefik = inventory_hostname in (groups['traefik'] | default([])) -%}
      {%- set _cm_hosts = groups['cert_manager'] | default([]) -%}
      {%- set _cm_cnt = _cm_hosts | length -%}
      {%- set _cm_in_traefik = (_cm_hosts | intersect(groups['traefik'] | default([]))) | length -%}
      {%- set _cm_in_haproxy = (_cm_hosts | intersect(groups['haproxy'] | default([]))) | length -%}
      {%- if _in_haproxy and _in_traefik -%}
      {%- if (_cm_cnt > 0) and (_cm_in_traefik == _cm_cnt) and (_cm_in_haproxy != _cm_cnt) -%}traefik
      {%- elif (_cm_cnt > 0) and (_cm_in_haproxy == _cm_cnt) and (_cm_in_traefik != _cm_cnt) -%}haproxy
      {%- else -%}haproxy{%- endif -%}
      {%- elif _in_haproxy -%}
      haproxy
      {%- elif _in_traefik -%}
      traefik
      {%- else -%}
      
      {%- endif -%}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Detect swarm membership for hostname schema
  ansible.builtin.set_fact:
    host_defaults_is_swarm_host: >-
      {{
        inventory_hostname in (groups['swarm_nodes'] | default([]))
      }}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Build role parts for auto hostname
  ansible.builtin.set_fact:
    host_defaults_role_parts: >-
      {{
        (
          ['node']
          if not (host_defaults_is_swarm_host | default(false) | bool)
          else (
            [
              'swarm',
              (
                'managers'
                if inventory_hostname in (groups['swarm_managers'] | default([]))
                else (
                  'workers'
                  if inventory_hostname in (groups['swarm_workers'] | default([]))
                  else ''
                )
              ),
              ('gluster' if inventory_hostname in (host_defaults_gluster_hosts | default([])) else ''),
              (host_defaults_svc_role | default('', true) | string | trim)
            ] | reject('equalto', '') | reject('equalto', 'None') | reject('equalto', 'none') | list
          )
        )
      }}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Select base group for hostname numbering
  ansible.builtin.set_fact:
    host_defaults_numbering_group: >-
      {%- if inventory_hostname in (groups['swarm_managers'] | default([])) -%}
      swarm_managers
      {%- elif inventory_hostname in (groups['swarm_workers'] | default([])) -%}
      swarm_workers
      {%- else -%}
      all
      {%- endif -%}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Build ordinal part for auto hostname
  ansible.builtin.set_fact:
    host_defaults_node_ordinal: >-
      {{
        (
          (
            host_defaults_gluster_hosts
            if (host_defaults_numbering_group == 'gluster')
            else (groups[host_defaults_numbering_group] | default([]))
          ).index(inventory_hostname)
        ) + 1
      }}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Build final auto hostname
  ansible.builtin.set_fact:
    host_defaults_auto_hostname: >-
      {{
        ([
          (
            ''
            if (host_defaults_is_swarm_host | default(false) | bool)
            else (
              ''
              if ((host_defaults_role_parts | default([]) | first | default('')) == 'node')
              else (host_defaults_hostname_prefix | default('node'))
            )
          ),
          (host_defaults_role_parts | default([]) | join('-')),
          ('%02d' | format((host_defaults_node_ordinal | int)))
        ] | reject('equalto', '') | list | join('-'))
        | lower
      }}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Read current static hostname
  become: true
  become_method: sudo
  ansible.builtin.command: hostnamectl --static
  register: host_defaults_current_hostname_cmd
  changed_when: false
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Cache current hostname value
  ansible.builtin.set_fact:
    host_defaults_current_hostname: "{{ host_defaults_current_hostname_cmd.stdout | default('') | trim }}"
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Detect if non-swarm inventory host is alias of swarm node
  ansible.builtin.set_fact:
    host_defaults_swarm_candidate_hosts: "{{ groups['swarm_nodes'] | default([]) }}"
    host_defaults_swarm_candidate_ips: []
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Build swarm candidate IP list for alias detection
  ansible.builtin.set_fact:
    host_defaults_swarm_candidate_ips: "{{ host_defaults_swarm_candidate_ips + [ (hostvars[item].ansible_host | default(item) | string) ] }}"
  loop: "{{ host_defaults_swarm_candidate_hosts | default([]) }}"
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Detect if non-swarm inventory host is alias of swarm node
  ansible.builtin.set_fact:
    host_defaults_is_alias_of_swarm: >-
      {{
        (
          (
            ansible_all_ipv4_addresses | default([])
          )
          | intersect(host_defaults_swarm_candidate_ips | default([]))
          | length
        ) > 0
      }}
  when: host_defaults_auto_hostname_enabled | default(false) | bool

- name: Set system hostname from inventory role groups
  become: true
  become_method: sudo
  ansible.builtin.hostname:
    name: "{{ host_defaults_auto_hostname }}"
  when:
    - host_defaults_auto_hostname_enabled | default(false) | bool
    - not (
        (not (host_defaults_is_swarm_host | default(false) | bool))
        and
        (
          ((host_defaults_current_hostname | default('')) is match('^swarm-'))
          or
          (host_defaults_is_alias_of_swarm | default(false) | bool)
        )
      )

- name: Check if auto update is enabled
  stat:
    path: /etc/apt/apt.conf.d/20auto-upgrades
  register: autoupdate

- name: Disable auto update
  when: autoupdate.stat.exists
  become: true
  become_method: sudo
  file:
    path: /etc/apt/apt.conf.d/20auto-upgrades
    state: absent

- name: Wait for any possibly running unattended upgrade to finish
  when: autoupdate.stat.exists
  become: true
  become_method: sudo
  raw: systemd-run --property="After=apt-daily.service apt-daily-upgrade.service" --wait /bin/true

- name: Reboot host(s) after disabling auto update
  shell: sleep 2 && /sbin/shutdown -r now "ansible reboot request"
  async: 1
  poll: 0
  ignore_errors: true
  become: true
  become_method: sudo
  when:
    - autoupdate.stat.exists
    - host_defaults_reboot_after_autoupdate_disable | default(false) | bool or ('reboot' in ansible_run_tags | default([]))
    - inventory_hostname != "127.0.0.1"
    - inventory_hostname != "localhost"
  tags: [reboot]

- name: Waiting for host(s) to reboot
  local_action: "wait_for host={{inventory_hostname}} port=22 state=started delay=60"
  become: false
  ignore_errors: true
  when:
    - autoupdate.stat.exists
    - host_defaults_reboot_after_autoupdate_disable | default(false) | bool or ('reboot' in ansible_run_tags | default([]))
    - inventory_hostname != "127.0.0.1"
    - inventory_hostname != "localhost"
  tags: [reboot]

- name: Remove legacy Docker apt repo files (list)
  become: true
  become_method: sudo
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "docker*.list"
    file_type: file
  register: docker_repo_list_files

- name: Remove legacy Docker apt repo files (sources)
  become: true
  become_method: sudo
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "docker*.sources"
    file_type: file
  register: docker_repo_sources_files

- name: Delete legacy Docker apt repo files
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: >-
    {{
      (docker_repo_list_files.files | default([]))
      + (docker_repo_sources_files.files | default([]))
    }}
  loop_control:
    label: "{{ item.path | default('unknown') }}"

- name: Ensure systemd-resolved drop-in directory exists
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: host_defaults_resolved_dns_enabled | default(true) | bool

- name: Configure systemd-resolved DNS defaults
  become: true
  become_method: sudo
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/99-dns.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Resolve]
      DNS={{ host_defaults_resolved_dns_servers | default(['1.1.1.1','8.8.8.8']) | join(' ') }}
      FallbackDNS={{ host_defaults_resolved_fallback_dns | default(['9.9.9.9']) | join(' ') }}
      DNSStubListener={{ host_defaults_resolved_dns_stub_listener | default('no') }}
  when: host_defaults_resolved_dns_enabled | default(true) | bool
  register: host_defaults_resolved_dns_cfg

- name: Restart systemd-resolved after DNS config change
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  when:
    - host_defaults_resolved_dns_enabled | default(true) | bool
    - host_defaults_resolved_dns_cfg is changed

- name: Ensure systemd-resolved is active
  become: true
  become_method: sudo
  ansible.builtin.command: systemctl is-active systemd-resolved
  changed_when: false
  when: host_defaults_resolved_dns_enabled | default(true) | bool

- name: Verify system dependencies
  become: true
  become_method: sudo
  apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg-agent
#      - gnupg
##      - software-properties-common
      - virtualenv
      - python3-venv
      - python3-pip
      - apache2-utils
    state: present
    force_apt_get: true
    update_cache: yes
    lock_timeout: 180
  register: verify_system_dependencies_apt
  until: verify_system_dependencies_apt is succeeded
  retries: 4
  delay: 10

##- name: Install Docker Python library
##  become: true
##  become_method: sudo
##  pip:
##    name: docker

- name: Upgrade all packages to the latest version
  become: true
  become_method: sudo
  apt:
    name: "*"
    state: latest
    force_apt_get: true
    update_cache: yes
    lock_timeout: 180
  register: upgrade_all_packages_apt
  until: upgrade_all_packages_apt is succeeded
  retries: 3
  delay: 15
