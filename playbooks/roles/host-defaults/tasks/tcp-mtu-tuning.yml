---
# net.ipv4.tcp_mtu_probing + iptables TCPMSS clamp (как ручные команды в тикете).
- name: Установить net.ipv4.tcp_mtu_probing (персистентно + применить)
  become: true
  become_method: sudo
  ansible.builtin.sysctl:
    name: net.ipv4.tcp_mtu_probing
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/99-tcp-mtu-probing.conf
    reload: true
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"

- name: Пакеты iptables для правил TCPMSS и сохранения
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name:
      - iptables
      - iptables-persistent
    state: present
    update_cache: false
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"

- name: Включить netfilter-persistent (загрузка правил при старте)
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: netfilter-persistent
    enabled: true
    state: started
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"

# ansible.builtin.iptables не поддерживает set_mss (нужен community.general или явный iptables).
- name: Check FORWARD TCPMSS clamp-mss-to-pmtu rule
  become: true
  become_method: sudo
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -C
      - FORWARD
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  register: host_defaults_mss_fwd_chk
  changed_when: false
  failed_when: false
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"

- name: Mangle FORWARD — TCPMSS clamp-mss-to-pmtu
  become: true
  become_method: sudo
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -A
      - FORWARD
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  register: host_defaults_iptables_mss_forward
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"
    - host_defaults_mss_fwd_chk.rc | default(1) != 0

- name: Check OUTPUT TCPMSS clamp-mss-to-pmtu rule
  become: true
  become_method: sudo
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -C
      - OUTPUT
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  register: host_defaults_mss_out_chk
  changed_when: false
  failed_when: false
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"

- name: Mangle OUTPUT — TCPMSS clamp-mss-to-pmtu
  become: true
  become_method: sudo
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -A
      - OUTPUT
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  register: host_defaults_iptables_mss_output
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"
    - host_defaults_mss_out_chk.rc | default(1) != 0

- name: Сохранить правила iptables (IPv4)
  become: true
  become_method: sudo
  ansible.builtin.command: netfilter-persistent save
  when:
    - host_defaults_tcp_mtu_tuning_enabled | default(true) | bool
    - ansible_os_family == "Debian"
    - >-
      (host_defaults_iptables_mss_forward is defined and host_defaults_iptables_mss_forward is changed)
      or (host_defaults_iptables_mss_output is defined and host_defaults_iptables_mss_output is changed)
  changed_when: true
