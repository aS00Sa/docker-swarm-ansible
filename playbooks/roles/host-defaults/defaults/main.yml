---
# Auto hostname generation from inventory role groups.
# Disabled by default; enable per-environment when needed.
host_defaults_auto_hostname_enabled: false

# Локаль UTF-8 (ru) и таймзона — задачи locale-timezone.yml (все ВМ при host-defaults).
host_defaults_locale_timezone_enabled: true
host_defaults_locale_lang: ru_RU.UTF-8
host_defaults_timezone: Europe/Moscow

# DNS defaults for hosts with unstable local resolver (e.g. VPN environments).
host_defaults_resolved_dns_enabled: true
host_defaults_resolved_dns_servers:
  - "1.1.1.1"
  - "8.8.8.8"
host_defaults_resolved_fallback_dns:
  - "9.9.9.9"
host_defaults_resolved_dns_stub_listener: "no"

# TCP Path MTU / MSS (sysctl net.ipv4.tcp_mtu_probing + iptables mangle TCPMSS).
# См. tasks/tcp-mtu-tuning.yml; отключить: host_defaults_tcp_mtu_tuning_enabled: false
host_defaults_tcp_mtu_tuning_enabled: true
