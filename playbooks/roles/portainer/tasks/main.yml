---
- name: Verify stacks directory exists (on first swarm node)
  when: inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  file:
    path: "/home/{{ansible_user}}/stacks"
    state: directory

- name: Verify Portainer volume path (on first swarm node)
  when: inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  become: true
  become_method: sudo
  block:
    - name: Probe Gluster mount path before Portainer dir create
      ansible.builtin.command: ls -ld "{{ gluster_mount_path }}"
      register: portainer_gluster_probe
      changed_when: false
      failed_when: false

    - name: Heal stale Gluster mount path endpoint for Portainer (if needed)
      ansible.builtin.shell: >
        umount -l "{{ gluster_mount_path }}" >/dev/null 2>&1 || true;
        mkdir -p "{{ gluster_mount_path }}"
      when: "'Transport endpoint is not connected' in (portainer_gluster_probe.stderr | default(''))"
      changed_when: false

    - name: Ensure Portainer volume path exists (idempotent)
      ansible.builtin.command:
        argv:
          - mkdir
          - -p
          - "{{ gluster_mount_path }}/{{ portainer_gfs_subdir }}"
      changed_when: false
      failed_when: false

- name: Generate admin password hash
  when: inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  shell: echo $(htpasswd -nBb {{ portainer_admin_user }} {{ portainer_admin_password }}) | cut -d ":" -f 2 | sed -e s/\\$/\\$\\$/g
  register: portainerpassword

- name: Create docker-compose stack file (on first swarm node)
  when: inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  template:
    src: portainer-agent-stack.j2
    dest: /home/{{ansible_user}}/stacks/portainer-agent-stack.yml
    mode: 0775

# См. traefik: docker stack deploy --detach вместо community.docker.docker_stack (без ожидания сходимости).
- name: Deploy stack from a compose file (on first swarm node)
  when: inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
  ansible.builtin.command:
    argv:
      - docker
      - stack
      - deploy
      - --detach
      - -c
      - /home/{{ ansible_user }}/stacks/portainer-agent-stack.yml
      - portainer
  register: portainer_stack_deploy
  changed_when: false
  failed_when: portainer_stack_deploy.rc != 0

- name: Validate required Edge vars
  when:
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - portainer_edge_enabled | default(false) | bool
  ansible.builtin.assert:
    that:
      - (portainer_edge_id | default('') | trim | length) > 0
      - (portainer_edge_key | default('') | trim | length) > 0
    fail_msg: >-
      portainer_edge_enabled=true requires portainer_edge_id and portainer_edge_key in inventory.

- name: Create Portainer Edge Agent stack file (on first swarm node)
  when:
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - portainer_edge_enabled | default(false) | bool
  template:
    src: portainer-edge-agent-stack.j2
    dest: /home/{{ansible_user}}/stacks/portainer-edge-agent-stack.yml
    mode: 0775

- name: Deploy Portainer Edge Agent stack (on first swarm node)
  when:
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - portainer_edge_enabled | default(false) | bool
  ansible.builtin.command:
    argv:
      - docker
      - stack
      - deploy
      - --detach
      - -c
      - /home/{{ ansible_user }}/stacks/portainer-edge-agent-stack.yml
      - "{{ portainer_edge_stack_name }}"
  register: portainer_edge_stack_deploy
  changed_when: false
  failed_when: portainer_edge_stack_deploy.rc != 0
