---
- name: Initialize edge NFS client IP allowlist
  ansible.builtin.set_fact:
    edge_nfs_client_ips: []

- name: Add edge host IPs to NFS allowlist
  ansible.builtin.set_fact:
    edge_nfs_client_ips: "{{ (edge_nfs_client_ips | default([])) + [ (hostvars[item].ansible_host | default(item)) ] }}"
  loop: "{{ ((groups['haproxy'] | default([])) + (groups['traefik'] | default([]))) | unique | list }}"
  loop_control:
    label: "{{ item }}"

- name: Assert we have at least one edge client IP
  ansible.builtin.assert:
    that:
      - (edge_nfs_client_ips | length) > 0
    fail_msg: >-
      No edge client IPs found from [haproxy]/[traefik]. Ensure those hosts have ansible_host set
      (public IP) in inventory.

- name: Install NFS Ganesha packages
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name:
      - nfs-ganesha
      - nfs-ganesha-vfs
    state: present
    update_cache: true

- name: Render ganesha.conf exporting Gluster mount
  become: true
  become_method: sudo
  ansible.builtin.template:
    src: ganesha.conf.j2
    dest: /etc/ganesha/ganesha.conf
    mode: "0644"

- name: Enable and restart nfs-ganesha
  become: true
  become_method: sudo
  ansible.builtin.systemd:
    name: nfs-ganesha
    enabled: true
    state: restarted
