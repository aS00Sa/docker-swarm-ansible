---
# В INI inventory key=[] или key= часто приходят строкой "[]" / "" — иначе map('trim') по строке обходит посимвольно и ломает плейбук.
- name: Нормализовать firewall_trusted_admin_cidrs в список строк
  ansible.builtin.set_fact:
    firewall_effective_admin_cidrs: >-
      {{
        (
          []
          if (
            firewall_trusted_admin_cidrs is not defined
            or (
              firewall_trusted_admin_cidrs is string
              and (firewall_trusted_admin_cidrs | trim) in ['', '[]']
            )
          )
          else (
            (
              (firewall_trusted_admin_cidrs | trim | from_yaml)
              if (
                firewall_trusted_admin_cidrs is string
                and (firewall_trusted_admin_cidrs | trim) is match('^\\[.*\\]$')
              )
              else (
                [firewall_trusted_admin_cidrs | trim]
                if firewall_trusted_admin_cidrs is string
                else firewall_trusted_admin_cidrs
              )
            )
          )
        )
        | flatten
        | map('trim')
        | map('regex_replace', '[\\[\\]]', '')
        | reject('equalto', '')
        | reject('equalto', '[]')
        | unique
        | list
      }}
