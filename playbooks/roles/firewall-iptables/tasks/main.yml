---
# Без полного lockdown: отдельные шаблоны — Swarm, Portainer, Gluster (свои цепочки INPUT).
- name: Ограничить служебные порты без lockdown (Swarm / Portainer / Gluster)
  when:
    - not (firewall_lockdown | bool)
    - ansible_os_family == 'Debian'
    - >-
      (firewall_restrict_swarm_ports | bool) or (firewall_restrict_portainer_service_ports | bool)
      or (firewall_restrict_gluster_service_ports | bool)
  block:
    - name: Эффективные CIDR админов (whitelist)
      ansible.builtin.include_tasks: normalize_trusted_admin_cidrs.yml

    - name: Собрать IP нод кластера (как при lockdown)
      ansible.builtin.set_fact:
        firewall_cluster_hosts: >-
          {{
            (
              (groups['swarm_nodes'] | default([]))
              + (groups['gluster_nodes'] | default([]))
              + (groups['haproxy'] | default([]))
            ) | unique | list
          }}

    - name: Разрешить IP нод (ansible_host или имя из inventory)
      ansible.builtin.set_fact:
        firewall_cluster_ips: "{{ firewall_cluster_ips | default([]) + [ (hostvars[item].ansible_host | default(item)) ] }}"
      loop: "{{ firewall_cluster_hosts }}"
      loop_control:
        label: "{{ item }}"

    - name: Пакеты iptables и сохранение правил
      ansible.builtin.apt:
        name:
          - iptables
          - iptables-persistent
        state: present
        update_cache: false

    - name: Включить netfilter-persistent
      ansible.builtin.systemd:
        name: netfilter-persistent
        enabled: true
        state: started

    - name: Проверка лимита multiport для Swarm (≤15 на TCP и UDP)
      ansible.builtin.assert:
        that:
          - (firewall_restrict_swarm_tcp_dports | default([2377, 7946]) | map('int') | list | unique | length) <= 15
          - (firewall_restrict_swarm_udp_dports | default([7946, 4789]) | map('int') | list | unique | length) <= 15
        fail_msg: Слишком много портов Swarm в одном multiport; сократите списки в defaults/inventory.
      when: firewall_restrict_swarm_ports | bool

    - name: Проверка лимита multiport для Portainer TCP (≤15)
      ansible.builtin.assert:
        that:
          - (firewall_restrict_portainer_tcp_dports | default([8000, 9001]) | map('int') | list | unique | length) <= 15
        fail_msg: Слишком много портов Portainer в одном multiport; сократите списки в defaults/inventory.
      when: firewall_restrict_portainer_service_ports | bool

    - name: Сгенерировать скрипт ограничения портов Swarm
      ansible.builtin.template:
        src: apply-swarm-ports-restrict.sh.j2
        dest: /root/.ansible-firewall-swarm-ports.sh
        mode: "0700"
      when: firewall_restrict_swarm_ports | bool

    - name: Применить ограничение портов Swarm
      ansible.builtin.command: /root/.ansible-firewall-swarm-ports.sh
      when: firewall_restrict_swarm_ports | bool
      changed_when: true

    - name: Сгенерировать скрипт ограничения служебных портов Portainer
      ansible.builtin.template:
        src: apply-portainer-ports-restrict.sh.j2
        dest: /root/.ansible-firewall-portainer-ports.sh
        mode: "0700"
      when: firewall_restrict_portainer_service_ports | bool

    - name: Применить ограничение служебных портов Portainer
      ansible.builtin.command: /root/.ansible-firewall-portainer-ports.sh
      when: firewall_restrict_portainer_service_ports | bool
      changed_when: true

    - name: Проверка списка дискретных TCP-портов Gluster (разумный предел правил)
      ansible.builtin.assert:
        that:
          - (firewall_restrict_gluster_tcp_dports | default([24007]) | map('int') | list | unique | length) <= 32
        fail_msg: Слишком много отдельных TCP-правил Gluster; сократите firewall_restrict_gluster_tcp_dports.
      when: firewall_restrict_gluster_service_ports | bool

    - name: Проверка формата диапазонов TCP Gluster (iptables start:end)
      ansible.builtin.fail:
        msg: "Элемент '{{ item }}' в firewall_restrict_gluster_tcp_dport_ranges должен быть «число:число» (например 49152:49664)."
      when:
        - firewall_restrict_gluster_service_ports | bool
        - not (item is match('^[0-9]+:[0-9]+$'))
      loop: "{{ firewall_restrict_gluster_tcp_dport_ranges | default([]) }}"
      loop_control:
        label: "{{ item }}"

    - name: Сгенерировать скрипт ограничения служебных портов Gluster
      ansible.builtin.template:
        src: apply-gluster-ports-restrict.sh.j2
        dest: /root/.ansible-firewall-gluster-ports.sh
        mode: "0700"
      when: firewall_restrict_gluster_service_ports | bool

    - name: Применить ограничение служебных портов Gluster
      ansible.builtin.command: /root/.ansible-firewall-gluster-ports.sh
      when: firewall_restrict_gluster_service_ports | bool
      changed_when: true

    - name: Сохранить iptables для перезагрузки
      ansible.builtin.command: netfilter-persistent save
      changed_when: false

- name: Снять ограничение портов Swarm (выключено в inventory)
  when:
    - not (firewall_restrict_swarm_ports | bool)
    - not (firewall_lockdown | bool)
    - ansible_os_family == 'Debian'
  block:
    - name: Удалить цепочку SWARM-NODE-PORTS из INPUT
      ansible.builtin.shell: |
        set +e
        while iptables -D INPUT -j SWARM-NODE-PORTS 2>/dev/null; do :; done
        iptables -F SWARM-NODE-PORTS 2>/dev/null
        iptables -X SWARM-NODE-PORTS 2>/dev/null
        exit 0
      args:
        executable: /bin/bash
      changed_when: true

    - name: Сохранить iptables после снятия Swarm-ограничения
      ansible.builtin.command: netfilter-persistent save
      changed_when: false
      failed_when: false

- name: Снять ограничение служебных портов Portainer (выключено в inventory)
  when:
    - not (firewall_restrict_portainer_service_ports | bool)
    - not (firewall_lockdown | bool)
    - ansible_os_family == 'Debian'
  block:
    - name: Удалить цепочку PORTAINER-NODE-PORTS из INPUT
      ansible.builtin.shell: |
        set +e
        while iptables -D INPUT -j PORTAINER-NODE-PORTS 2>/dev/null; do :; done
        iptables -F PORTAINER-NODE-PORTS 2>/dev/null
        iptables -X PORTAINER-NODE-PORTS 2>/dev/null
        exit 0
      args:
        executable: /bin/bash
      changed_when: true

    - name: Сохранить iptables после снятия Portainer-ограничения
      ansible.builtin.command: netfilter-persistent save
      changed_when: false
      failed_when: false

- name: Снять ограничение служебных портов Gluster (выключено в inventory)
  when:
    - not (firewall_restrict_gluster_service_ports | bool)
    - not (firewall_lockdown | bool)
    - ansible_os_family == 'Debian'
  block:
    - name: Удалить цепочку GLUSTER-NODE-PORTS из INPUT
      ansible.builtin.shell: |
        set +e
        while iptables -D INPUT -j GLUSTER-NODE-PORTS 2>/dev/null; do :; done
        iptables -F GLUSTER-NODE-PORTS 2>/dev/null
        iptables -X GLUSTER-NODE-PORTS 2>/dev/null
        exit 0
      args:
        executable: /bin/bash
      changed_when: true

    - name: Сохранить iptables после снятия Gluster-ограничения
      ansible.builtin.command: netfilter-persistent save
      changed_when: false
      failed_when: false

- name: Жёсткий iptables lockdown (INPUT + DOCKER-USER)
  when:
    - firewall_lockdown | bool
    - ansible_os_family == 'Debian'
  block:
    - name: Эффективные CIDR админов (только firewall_trusted_admin_cidrs)
      ansible.builtin.include_tasks: normalize_trusted_admin_cidrs.yml

    - name: Проверка переменных lockdown
      ansible.builtin.assert:
        that:
          - (not (firewall_allow_ssh_only_admin | default(false) | bool)) or (firewall_effective_admin_cidrs | length) > 0
        fail_msg: >-
          При firewall_allow_ssh_only_admin=true задайте непустой firewall_trusted_admin_cidrs (или отключите only_admin для SSH).

    - name: Собрать IP нод кластера (Swarm + Gluster + HAProxy)
      ansible.builtin.set_fact:
        firewall_cluster_hosts: >-
          {{
            (
              (groups['swarm_nodes'] | default([]))
              + (groups['gluster_nodes'] | default([]))
              + (groups['haproxy'] | default([]))
            ) | unique | list
          }}

    - name: Публичные TCP (haproxy_*, traefik_* — те же имена, что в стеках; без отдельных firewall_*-портов)
      ansible.builtin.set_fact:
        firewall_public_tcp_merged: >-
          {{
            (
              [haproxy_http_port | default(80) | int,
               haproxy_https_port | default(443) | int,
               haproxy_stats_port | default(80) | int,
               traefik_http_port | default(8080) | int,
               traefik_https_port | default(8443) | int]
            ) | unique | sort | list
          }}

    - name: Проверка лимита iptables multiport для публичных портов (≤15)
      ansible.builtin.assert:
        that:
          - (firewall_public_tcp_merged | length) <= 15
        fail_msg: >-
          Слишком много публичных TCP-портов для одного iptables multiport (≤15).
          Сократите список или разбейте правила вручную.

    - name: Разрешить IP нод (ansible_host или имя из inventory)
      ansible.builtin.set_fact:
        firewall_cluster_ips: "{{ firewall_cluster_ips | default([]) + [ (hostvars[item].ansible_host | default(item)) ] }}"
      loop: "{{ firewall_cluster_hosts }}"
      loop_control:
        label: "{{ item }}"

    - name: Пакеты iptables и сохранение правил
      ansible.builtin.apt:
        name:
          - iptables
          - iptables-persistent
        state: present
        update_cache: false

    - name: Включить netfilter-persistent
      ansible.builtin.systemd:
        name: netfilter-persistent
        enabled: true
        state: started

    - name: Сгенерировать и выполнить правила lockdown
      ansible.builtin.template:
        src: apply-lockdown.sh.j2
        dest: /root/.ansible-firewall-lockdown.sh
        mode: "0700"

    - name: Применить lockdown (iptables)
      ansible.builtin.command: /root/.ansible-firewall-lockdown.sh
      changed_when: true

    - name: Сохранить iptables для перезагрузки
      ansible.builtin.command: netfilter-persistent save
      changed_when: false
