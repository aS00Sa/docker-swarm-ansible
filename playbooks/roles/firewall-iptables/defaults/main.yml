---
# По умолчанию ограничения выключены: firewall_lockdown=false, *_only_admin=false.
# Включайте по шагам: сначала firewall_lockdown=true и trusted CIDR, затем при необходимости *_only_admin=true.
#
# Жёсткий iptables lockdown (INPUT + DOCKER-USER). false — цепочки не применяются; true — правила из inventory.
# firewall_lockdown дублируется в комментариях роли haproxy (ACL /stats); переопределяйте в inventory.
firewall_lockdown: false

# CIDR админов (офис, VPN): при lockdown — полный доступ к хосту и к published-портам Docker; тот же список для HAProxy /stats.
firewall_trusted_admin_cidrs: []

# false — SSH (firewall_ssh_port) с любого IP при lockdown; true — только ноды кластера и firewall_trusted_admin_cidrs.
firewall_allow_ssh_only_admin: false

firewall_ssh_port: 22

# Публичные TCP для цепочек: haproxy_* и traefik_* (см. tasks).

# false — ICMP (ping) с любого IP при lockdown; true — только кластер и firewall_trusted_admin_cidrs.
firewall_allow_icmp_only_admin: false
