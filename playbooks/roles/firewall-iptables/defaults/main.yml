---
# Временный каталог модулей на ноде: задаётся в ansible.cfg ([defaults] remote_tmp), не дублировать здесь —
# иначе перекрывается cfg и снова ломается запись под пользователем SSH (исторически был /run + chmod 0700).

# По умолчанию: firewall_lockdown=false, *_only_admin=false (без жёстких ограничений).
# Поэтапное ужесточение (не наоборот: без lockdown не работают iptables и ACL /stats по CIDR в роли haproxy):
#   1) firewall_lockdown=true;
#   2) firewall_trusted_admin_cidrs (офис/VPN);
#   3) при необходимости firewall_allow_ssh_only_admin=true и/или firewall_allow_icmp_only_admin=true.
firewall_lockdown: false

# Пока полный lockdown выключен: отдельные скрипты (шаблоны) для Swarm, Portainer и Gluster — см. ниже.
firewall_restrict_swarm_ports: true

# Шаблон apply-swarm-ports-restrict.sh.j2 — цепочка SWARM-NODE-PORTS.
firewall_restrict_swarm_tcp_dports: [2377, 7946]
firewall_restrict_swarm_udp_dports: [7946, 4789]

# Шаблон apply-portainer-ports-restrict.sh.j2 — цепочка PORTAINER-NODE-PORTS (роль portainer: 8000 tunnel, 9001 agent).
firewall_restrict_portainer_service_ports: true
firewall_restrict_portainer_tcp_dports: [8000, 9001]

# Шаблон apply-gluster-ports-restrict.sh.j2 — цепочка GLUSTER-NODE-PORTS (glusterd + brick-порты).
firewall_restrict_gluster_service_ports: true
firewall_restrict_gluster_tcp_dports: [24007]
# Диапазоны в формате iptables «start:end» (brick-порты + возможные динамические порты glusterfsd).
firewall_restrict_gluster_tcp_dport_ranges:
  - '40000:49999'
  - '50000:59999'
  - '60000:65535'

firewall_trusted_admin_cidrs: []

# true — SSH только кластер + trusted CIDR; false — ещё и с интернета (порт default_ssh_port из cluster-defaults / inventory).
firewall_allow_ssh_only_admin: false

# true — ICMP только кластер + trusted; false — ещё ping с интернета.
firewall_allow_icmp_only_admin: false
