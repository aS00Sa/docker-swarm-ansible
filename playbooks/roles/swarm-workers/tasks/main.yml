---
- name: Check Swarm state
  become: true
  become_method: sudo
  shell: docker info --format '{{ .Swarm.LocalNodeState }}'
  register: swarm_state
  ignore_errors: true
  changed_when: false

#- name: Leave existing Swarm if active
#  shell: docker swarm leave --force
#  when: (swarm_state.stdout | default('')) == "active"
#  ignore_errors: true

- name: Add Docker node to existing Swarm as manager
  become: true
  become_method: sudo
  shell: docker swarm join --token {{ hostvars[groups['swarm_managers'][0]]['worker_token']['stdout'] }} {{ hostvars[groups['swarm_managers'][0]]['ansible_default_ipv4']['address'] }}:2377
  when: (swarm_state.stdout | default('')) != "active"

