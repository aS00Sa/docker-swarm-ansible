---
- name: Check Swarm state
  become: true
  become_method: sudo
  # docker uses Go templates ({{ .Swarm.LocalNodeState }}); escape Jinja so Ansible passes it literally
  shell: docker info --format "{{ '{{' }} .Swarm.LocalNodeState {{ '}}' }}"
  register: swarm_state
  ignore_errors: true
  changed_when: false

#- name: Leave existing Swarm if active
#  shell: docker swarm leave --force
#  when: (swarm_state.stdout | default('')) == "active"
#  ignore_errors: true

- name: Add Docker node to existing Swarm as manager
  become: true
  become_method: sudo
  vars:
    swarm_manager_first: "{{ (groups['swarm_managers'] | default([])) | first | default('') }}"
    swarm_manager_join_ip: >-
      {{
        hostvars[swarm_manager_first]['ansible_default_ipv4']['address']
          | default(hostvars[swarm_manager_first]['ansible_host'] | default(swarm_manager_first))
      }}
  shell: >-
    docker swarm join
    --token {{ hostvars[swarm_manager_first]['worker_token']['stdout'] }}
    {{ swarm_manager_join_ip }}:2377
  register: swarm_join_result
  changed_when: >
    (swarm_join_result.rc | int == 0) and
    ('This node joined a swarm as a worker.' in (swarm_join_result.stdout | default('')))
  failed_when: false
  when:
    - (swarm_state.stdout | default('')) != "active"
    - swarm_manager_first | length > 0

- name: Wait until node becomes active in swarm
  become: true
  become_method: sudo
  shell: docker info --format "{{ '{{' }} .Swarm.LocalNodeState {{ '}}' }}"
  register: swarm_state_after_join
  changed_when: false
  retries: 6
  delay: 5
  until: (swarm_state_after_join.stdout | default('') | trim) == "active"
  when:
    - (swarm_state.stdout | default('')) != "active"
    - swarm_manager_first | length > 0
