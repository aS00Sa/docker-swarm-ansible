---
# При import_role из playbooks/plays/*.yml Ansible может выставить role_path в несуществующий .../plays/roles/…;
# каталог files на контроллере всегда в playbooks/roles/generate-certs/files.
- name: Controller path to generate-certs/files
  ansible.builtin.set_fact:
    generate_certs_controller_files_dir: >-
      {{ playbook_dir ~ ('/../roles/generate-certs/files' if (playbook_dir | basename) == 'plays'
      else '/roles/generate-certs/files') }}
    generate_certs_remote_ssl_dir: "{{ ansible_user_dir }}/ssl"

- name: Ensure cert generation directory exists
  become: true
  become_method: sudo
  file:
    path: "{{ generate_certs_remote_ssl_dir }}"
    state: directory
    mode: "0755"

- name: Copy root-ca.crt on the remote machine
  become: true
  become_method: sudo
  copy:
    src: "{{ generate_certs_controller_files_dir }}/root-ca.crt"
    dest: "{{ generate_certs_remote_ssl_dir }}/root-ca.crt"

- name: Copy root-ca.crt to /usr/share/ca-certificates/root-ca.crt
  become: true
  become_method: sudo
  copy:
    src: "{{ generate_certs_controller_files_dir }}/root-ca.crt"
    dest: "/usr/share/ca-certificates/root-ca.crt"

- name: Copy root-ca.key on the remote machine
  become: true
  become_method: sudo
  copy:
    src: "{{ generate_certs_controller_files_dir }}/root-ca.key"
    dest: "{{ generate_certs_remote_ssl_dir }}/root-ca.key"

- name: update trusted ca debian/ubuntu
  become: true
  become_method: sudo
  shell: /usr/sbin/update-ca-certificates

- name: Copy cert generation script to host
  become: true
  become_method: sudo
  template:
    src: generate_certs.j2
    dest: /tmp/generate_certs.sh
    mode: '0755'

- name: Run cert generation script
  become: true
  become_method: sudo
  shell: /tmp/generate_certs.sh
