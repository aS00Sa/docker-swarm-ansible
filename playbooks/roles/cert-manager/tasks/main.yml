---
- name: Resolve cert_manager_certs_effective (legacy list or cert_manager_certs1..N)
  ansible.builtin.include_tasks: resolve_cert_manager_certs.yml

- name: Compute edge cert-manager shared-storage policy
  ansible.builtin.set_fact:
    cert_manager_edge_nodes: "{{ ((groups['haproxy'] | default([])) + (groups['traefik'] | default([]))) | unique | list }}"
    cert_manager_use_shared_storage_effective: >-
      {{
        (cert_manager_use_shared_storage | default(false) | bool)
        and (inventory_hostname in (((groups['haproxy'] | default([])) + (groups['traefik'] | default([]))) | unique | list))
        and ((((groups['haproxy'] | default([])) + (groups['traefik'] | default([]))) | unique | list | length) >= (cert_manager_edge_min_nodes_for_shared_storage | default(3) | int))
      }}
    cert_manager_shared_storage_mount_path: "{{ cert_manager_edge_gluster_mount_path | default('/mnt/gfs-cert-manager') }}"
    cert_manager_storage_base_dir_effective: >-
      {{
        ((cert_manager_edge_gluster_mount_path | default('/mnt/gfs-cert-manager')) ~ '/' ~ (cert_manager_gfs_subdir | default('cert_manager_gfs')))
        if (
          (cert_manager_use_shared_storage | default(false) | bool)
          and (inventory_hostname in (((groups['haproxy'] | default([])) + (groups['traefik'] | default([]))) | unique | list))
          and ((((groups['haproxy'] | default([])) + (groups['traefik'] | default([]))) | unique | list | length) >= (cert_manager_edge_min_nodes_for_shared_storage | default(3) | int))
        )
        else (cert_manager_compose_project_dir | default('/opt/cert-manager'))
      }}

- name: Apply effective cert-manager storage base dir
  ansible.builtin.set_fact:
    cert_manager_storage_base_dir: "{{ cert_manager_storage_base_dir_effective }}"

- name: Skip cert-manager when disabled
  when: not (cert_manager_enabled | default(false) | bool)
  ansible.builtin.debug:
    msg: "cert-manager disabled (cert_manager_enabled=false)"

- name: Assert Gluster mount is present for cert-manager storage
  when: cert_manager_enabled | default(false) | bool
  become: true
  become_method: sudo
  block:
    - name: Mark storage ready in standalone mode (no shared mount required)
      ansible.builtin.set_fact:
        cert_manager_gluster_ok: true
      when: not (cert_manager_use_shared_storage_effective | default(false) | bool)

    - name: Check gluster mountpoint exists
      ansible.builtin.command: mountpoint -q "{{ cert_manager_shared_storage_mount_path }}"
      register: cert_manager_mountpoint
      changed_when: false
      failed_when: false
      when: cert_manager_use_shared_storage_effective | default(false) | bool

    - name: Verify fstype of gluster mount
      ansible.builtin.command: findmnt -n -o FSTYPE --target "{{ cert_manager_shared_storage_mount_path }}"
      register: cert_manager_findmnt_fstype
      changed_when: false
      failed_when: >-
        cert_manager_findmnt_fstype.rc != 0
        or (cert_manager_findmnt_fstype.stdout | trim) not in ['glusterfs', 'fuse.glusterfs', 'nfs4']
      when:
        - cert_manager_use_shared_storage_effective | default(false) | bool
        - (cert_manager_mountpoint.rc | default(1)) == 0

    - name: Set cert-manager gluster mount readiness fact
      ansible.builtin.set_fact:
        cert_manager_gluster_ok: >-
          {{
            (cert_manager_mountpoint.rc | default(1)) == 0
            and (cert_manager_findmnt_fstype.rc | default(1)) == 0
            and (cert_manager_findmnt_fstype.stdout | default('') | trim) in ['glusterfs', 'fuse.glusterfs', 'nfs4']
          }}
      when: cert_manager_use_shared_storage_effective | default(false) | bool

    - name: Warn when cert-manager path is not a mounted GlusterFS
      ansible.builtin.debug:
        msg: >-
          {{ cert_manager_shared_storage_mount_path }} is not a valid GlusterFS mountpoint on this host.
          GFS-backed cert-manager storage will be skipped to avoid writing files into a local directory
          that can later be hidden by a mount.
      when:
        - cert_manager_use_shared_storage_effective | default(false) | bool
        - not (cert_manager_gluster_ok | default(false) | bool)

    - name: Fail when shared storage is required but mount is not ready
      ansible.builtin.fail:
        msg: >-
          cert_manager_use_shared_storage=true on edge with >= {{ cert_manager_edge_min_nodes_for_shared_storage | default(3) }}
          nodes requires mounted shared storage on {{ cert_manager_shared_storage_mount_path }}.
          cert-manager deployment is blocked until mountpoint/fstype is valid (glusterfs/fuse.glusterfs/nfs4).
      when:
        - cert_manager_use_shared_storage_effective | default(false) | bool
        - not (cert_manager_gluster_ok | default(false) | bool)

- name: Ensure cert-manager dirs exist on GFS
  when:
    - cert_manager_enabled | default(false) | bool
    - cert_manager_gluster_ok | default(false) | bool
  become: true
  become_method: sudo
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0775"
  loop:
    - "{{ cert_manager_storage_base_dir }}"
    - "{{ cert_manager_storage_base_dir }}/{{ cert_manager_letsencrypt_subdir }}"
    - "{{ cert_manager_storage_base_dir }}/{{ cert_manager_webroot_subdir }}"

- name: Compute cert-manager VIP IP (keepalived)
  when:
    - cert_manager_enabled | default(false) | bool
    - (keepalived_vip_cidr | default('') | trim | length) > 0
  ansible.builtin.set_fact:
    cert_manager_vip_ip: "{{ (keepalived_vip_cidr | trim).split('/')[0] }}"

- name: Check if this host currently owns keepalived VIP (MASTER)
  when:
    - cert_manager_enabled | default(false) | bool
    - (keepalived_vip_cidr | default('') | trim | length) > 0
    - cert_manager_singleton_keepalived_vip | default(true) | bool
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - "ip -o -4 addr show dev {{ keepalived_interface | default('eth0') }} | awk '{print $4}' | cut -d/ -f1"
  register: cert_manager_iface_ipv4s
  changed_when: false
  failed_when: false

- name: Decide whether to run cert-manager on this host
  when:
    - cert_manager_enabled | default(false) | bool
  ansible.builtin.set_fact:
    cert_manager_should_run: >-
      {{
        (
          (cert_manager_singleton_inventory_hostnames | default([]) | length) > 0
        )
        | ternary(
            inventory_hostname in (cert_manager_singleton_inventory_hostnames | map('string') | list),
            (
              (
                (cert_manager_singleton_keepalived_vip | default(true) | bool)
                and ((keepalived_vip_cidr | default('') | trim | length) > 0)
              )
              | ternary(
                  (cert_manager_vip_ip | default('')) in (cert_manager_iface_ipv4s.stdout_lines | default([])),
                  true
                )
            )
          )
      }}

- name: Deploy cert-manager via docker compose (project dir)
  when:
    - cert_manager_enabled | default(false) | bool
    - (cert_manager_deploy_method | default('compose')) == 'compose'
    - cert_manager_should_run | default(true) | bool
  become: true
  become_method: sudo
  block:
    - name: Ensure cert-manager project dir exists
      ansible.builtin.file:
        path: "{{ cert_manager_compose_project_dir | default('/opt/cert-manager') }}"
        state: directory
        mode: "0755"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ cert_manager_compose_project_dir | default('/opt/cert-manager') }}/docker-compose.yml"
        mode: "0644"

    - name: Render docker-compose.yml to fixed GFS path
      when:
        - cert_manager_use_shared_storage_effective | default(false) | bool
        - cert_manager_gluster_ok | default(false) | bool
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ cert_manager_shared_storage_mount_path }}/{{ cert_manager_gfs_subdir }}/docker-compose.yml"
        mode: "0644"

    - name: Start/Update cert-manager with docker compose
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ cert_manager_compose_project_dir | default('/opt/cert-manager') }}/docker-compose.yml"
          - up
          - -d
      register: cert_manager_compose_up
      changed_when: false
      failed_when: >-
        (cert_manager_compose_up.rc | default(1)) != 0
        and ('unauthenticated pull rate limit' not in (cert_manager_compose_up.stderr | default('') | lower))

    - name: Warn when cert-manager deploy was skipped by Docker Hub rate limit
      ansible.builtin.debug:
        msg: >-
          cert-manager compose up skipped due to Docker Hub unauthenticated pull rate limit.
          Retry later or configure authenticated pull/mirror for nginx:alpine and certbot/certbot.
      when:
        - cert_manager_compose_up is defined
        - (cert_manager_compose_up.rc | default(0)) != 0
        - "'unauthenticated pull rate limit' in (cert_manager_compose_up.stderr | default('') | lower)"

    - name: Restart Traefik compose service to reload issued certificates
      when:
        - cert_manager_restart_traefik_after_issue | default(true) | bool
        - inventory_hostname in (groups['traefik'] | default([]))
        - cert_manager_compose_up is defined
        - (cert_manager_compose_up.rc | default(1)) == 0
      vars:
        _traefik_compose_dir: >-
          {{
            traefik_compose_project_dir
            | default(gluster_mount_path ~ '/' ~ (traefik_gfs_subdir | default('traefik_gfs')))
          }}
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ _traefik_compose_dir }}/docker-compose.yml"
          - restart
          - traefik
      changed_when: false
      failed_when: false

- name: Stop cert-manager on non-master nodes (keepalived VIP or singleton_inventory_hostnames)
  when:
    - cert_manager_enabled | default(false) | bool
    - (cert_manager_deploy_method | default('compose')) == 'compose'
    - cert_manager_singleton_keepalived_vip | default(true) | bool
    - cert_manager_stop_on_non_master | default(true) | bool
    - >-
      (
        (keepalived_vip_cidr | default('') | trim | length) > 0
        or (cert_manager_singleton_inventory_hostnames | default([]) | length) > 0
      )
    - not (cert_manager_should_run | default(false) | bool)
  become: true
  become_method: sudo
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ cert_manager_compose_project_dir | default('/opt/cert-manager') }}/docker-compose.yml"
      - down
  changed_when: false
  failed_when: false

- name: Verify stacks directory exists (on first swarm node)
  when:
    - cert_manager_enabled | default(false) | bool
    - (cert_manager_deploy_method | default('compose')) == 'stack'
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - cert_manager_should_run | default(true) | bool
  ansible.builtin.template:
    src: cert-manager-stack.j2
    dest: "/home/{{ ansible_user }}/stacks/{{ cert_manager_stack_name }}.yml"
    mode: "0644"

- name: Deploy cert-manager stack (on first swarm node)
  when:
    - cert_manager_enabled | default(false) | bool
    - inventory_hostname == ((groups['swarm_managers'] | default([])) | first | default(''))
    - (cert_manager_deploy_method | default('compose')) == 'stack'
    - cert_manager_should_run | default(true) | bool
  ansible.builtin.command:
    argv:
      - docker
      - stack
      - deploy
      - --detach
      - -c
      - "/home/{{ ansible_user }}/stacks/{{ cert_manager_stack_name }}.yml"
      - "{{ cert_manager_stack_name }}"
  changed_when: false

- name: Link cert-manager live certs to HAProxy ssl dir (optional)
  when:
    - cert_manager_enabled | default(false) | bool
    - cert_manager_link_to_haproxy_ssl_dir | default(false) | bool
    - ((groups['haproxy'] | default([])) | intersect([inventory_hostname]) | length) > 0
    - cert_manager_gluster_ok | default(false) | bool
  become: true
  become_method: sudo
  block:
    - name: Ensure HAProxy ssl dir exists
      ansible.builtin.file:
        path: "{{ cert_manager_haproxy_ssl_dir }}"
        state: directory
        mode: "0755"

    - name: Build cert name list for HAProxy cert directory
      ansible.builtin.set_fact:
        cert_manager_haproxy_cert_names: >-
          {{
            (
              cert_manager_certs_effective
              | default(cert_manager_certs | default([]))
              | select('mapping')
              | selectattr('cert_name', 'defined')
              | map(attribute='cert_name')
              | map('string')
              | map('trim')
              | reject('equalto', '')
              | list
            ) | unique
          }}

    - name: Check fullchain.pem presence for each cert
      ansible.builtin.stat:
        path: "{{ cert_manager_storage_base_dir }}/{{ cert_manager_letsencrypt_subdir }}/live/{{ item }}/fullchain.pem"
        follow: true
      loop: "{{ cert_manager_haproxy_cert_names }}"
      loop_control:
        label: "{{ item }}"
      register: cert_manager_fullchain_stats

    - name: Check privkey.pem presence for each cert
      ansible.builtin.stat:
        path: "{{ cert_manager_storage_base_dir }}/{{ cert_manager_letsencrypt_subdir }}/live/{{ item }}/privkey.pem"
        follow: true
      loop: "{{ cert_manager_haproxy_cert_names }}"
      loop_control:
        label: "{{ item }}"
      register: cert_manager_privkey_stats

    - name: Build list of certs missing fullchain/privkey
      ansible.builtin.set_fact:
        cert_manager_haproxy_cert_names_missing: >-
          {{
            (
              (
                cert_manager_fullchain_stats.results
                | rejectattr('stat.exists', 'equalto', true)
                | map(attribute='item')
                | list
              )
              +
              (
                cert_manager_privkey_stats.results
                | rejectattr('stat.exists', 'equalto', true)
                | map(attribute='item')
                | list
              )
            ) | unique
          }}

    - name: Build list of certs eligible for PEM build
      ansible.builtin.set_fact:
        cert_manager_haproxy_cert_names_ready: >-
          {{
            (
              cert_manager_haproxy_cert_names
              | reject('in', cert_manager_haproxy_cert_names_missing | default([]))
              | list
            )
          }}

    - name: Warn about certs missing fullchain/privkey (PEM build skipped)
      ansible.builtin.debug:
        msg: >-
          Skipping HAProxy PEM build for certs with missing files:
          {{ cert_manager_haproxy_cert_names_missing | join(', ') }}.
          Expected files under:
          {{ cert_manager_storage_base_dir }}/{{ cert_manager_letsencrypt_subdir }}/live/<cert_name>/fullchain.pem
          and privkey.pem.
      when: (cert_manager_haproxy_cert_names_missing | default([]) | length) > 0

    - name: Build per-site PEM bundles for HAProxy TLS bind
      ansible.builtin.shell: |
        set -euo pipefail
        cat \
          "{{ cert_manager_storage_base_dir }}/{{ cert_manager_letsencrypt_subdir }}/live/{{ item }}/fullchain.pem" \
          "{{ cert_manager_storage_base_dir }}/{{ cert_manager_letsencrypt_subdir }}/live/{{ item }}/privkey.pem" \
          > "{{ cert_manager_haproxy_ssl_dir }}/{{ item }}.pem"
        chmod 0600 "{{ cert_manager_haproxy_ssl_dir }}/{{ item }}.pem"
      args:
        executable: /bin/bash
      changed_when: true
      loop: "{{ cert_manager_haproxy_cert_names_ready | default([]) }}"