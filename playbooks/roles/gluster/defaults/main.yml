---
# Совпадает с типичным inventory; пустой device2_hdd_dev — bricks на локальной ФС под gluster_volume_path.
# Сырой блочный диск только для mkfs.xfs (например /dev/sdb). В fstab по умолчанию тот же путь.
device2_hdd_dev: ""
# Явный источник для fstab (UUID=... или /dev/disk/by-uuid/...). Пусто — при device2_hdd_dev=/dev/... UUID
# берётся автоматически (blkid после mkfs). Переопределение вручную: host_vars или gluster_brick_mount_src.
gluster_brick_mount_src: ""
# Если true и задан /dev/... — в fstab пишется UUID=... (blkid). false — как раньше, путь /dev/...
gluster_brick_fstab_use_uuid: true
gluster_volume_path: /glusterfs/bricks
gluster_volume_name: gfs
gluster_mount_path: /mnt/gfs

# Если {{ gluster_mount_path }} НЕ является mountpoint-ом GlusterFS, но внутри есть данные
# (например, локально созданные каталоги от приложений), то серверный этап не сможет
# безопасно примонтировать volume поверх. По умолчанию это "fail fast" с диагностикой.
# Включите флаг, чтобы автоматически унести "остатки" в бэкап и продолжить.
gluster_mount_autoclean_unmounted_path: true
gluster_mount_autoclean_backup_dir: /root/gfs-recovery-backup

# Ограничить диапазон портов brick-процессов (glusterfsd), чтобы он совпадал с firewall правилами.
# Эти опции пишутся в /etc/glusterfs/glusterd.vol как:
#   option base-port <int>
#   option max-port <int>
gluster_brick_port_range_enabled: false
gluster_brick_base_port: 49152
gluster_brick_max_port: 49664
