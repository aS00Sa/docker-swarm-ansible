---
- name: Check if Gluster volume is initialized
  stat:
    path: "{{gluster_volume_path}}/{{inventory_hostname}}/brick"
  register: glustervolume

- name: Verify Gluster volume path
  become: true
  become_method: sudo
  file:
    path: "{{gluster_volume_path}}/{{inventory_hostname}}/brick"
    state: directory

- name: Build active Gluster nodes list for current play
  ansible.builtin.set_fact:
    gluster_active_nodes: >-
      {{
        (
          (groups['gluster_nodes_bricks'] | default([]))
          | intersect(ansible_play_hosts_all | default([]))
        )
        if (
          ((groups['gluster_nodes_bricks'] | default([]))
          | intersect(ansible_play_hosts_all | default([]))
          | length) > 0
        )
        else (ansible_play_hosts_all | default([]))
      }}

# Если каталог brick уже есть, старый when по stat пропускал create — тома в кластере нет (см. лог no_volume).
- name: Probe Gluster volume in cluster (first node)
  run_once: true
  delegate_to: "{{ gluster_active_nodes[0] }}"
  become: true
  become_method: sudo
  shell: gluster volume list | grep -qxF '{{ gluster_volume_name }}'
  register: gluster_cluster_volume_probe
  failed_when: false
  changed_when: false
  args:
    executable: /bin/bash

- name: Set fact — том отсутствует в кластере (на всех нодах плей)
  set_fact:
    gluster_volume_missing_in_cluster: "{{ hostvars[gluster_active_nodes[0]]['gluster_cluster_volume_probe'].rc | default(1) != 0 }}"

- name: Initialize Gluster Cluster (on first node)
  when: >-
    inventory_hostname == gluster_active_nodes[0] and
    ( gluster_volume_missing_in_cluster | default(false) or glustervolume.stat.exists == false )
  become: true
  become_method: sudo
  loop: "{{ gluster_active_nodes }}"
  shell: gluster peer probe {{ item }}
  register: gluster_peer_probe_results
  failed_when: false
  changed_when: >
    (gluster_peer_probe_results.rc | default(1)) == 0 and
    (
      'peer probe: success' in (gluster_peer_probe_results.stdout | default('') | lower)
      or 'probe on localhost not needed' in (gluster_peer_probe_results.stdout | default('') | lower)
    )

- name: Debug peer probe warnings (best effort mode)
  ansible.builtin.debug:
    msg:
      - "gluster peer probe returned non-fatal rc={{ item.rc | default('n/a') }} for {{ item.item | default('n/a') }}"
      - "stdout={{ item.stdout | default('') }}"
      - "stderr={{ item.stderr | default('') }}"
  loop: "{{ gluster_peer_probe_results.results | default([]) }}"
  when:
    - inventory_hostname == gluster_active_nodes[0]
    - (item.rc | default(0)) != 0

- name: Collect Gluster peer status (first node)
  when: inventory_hostname == gluster_active_nodes[0]
  become: true
  become_method: sudo
  ansible.builtin.command: gluster peer status
  register: gluster_peer_status_raw
  changed_when: false
  failed_when: false

- name: Build disconnected peer list from Gluster peer status
  when: inventory_hostname == gluster_active_nodes[0]
  ansible.builtin.set_fact:
    gluster_disconnected_peers: >-
      {{
        (
          gluster_peer_status_raw.stdout
          | default('')
          | regex_findall('Hostname:\\s*([^\\n]+)\\n(?:.|\\n)*?State:\\s*(?!Peer in Cluster).*')
          | map('trim')
          | list
        )
      }}

- name: Fail early when some Gluster peers are not in cluster state
  when:
    - inventory_hostname == gluster_active_nodes[0]
    - (gluster_disconnected_peers | default([]) | length) > 0
  ansible.builtin.fail:
    msg: >-
      Gluster peer state is inconsistent. The following peers are not in "Peer in Cluster" state:
      {{ gluster_disconnected_peers | join(', ') }}.
      Fix peer connectivity/membership first, then rerun.

- name: Create Gluster Volume (on first node)
  when: inventory_hostname == gluster_active_nodes[0] and gluster_volume_missing_in_cluster | default(false)
  become: true
  become_method: sudo
  # Без отдельного диска brick на корне — Gluster требует суффикс force
  vars:
    gluster_volume_create_force: "{{ 'force' if (device2_hdd_dev | default('') | trim | length) == 0 else '' }}"
    # Replica в Gluster должен соответствовать количеству brick-ов в команде.
    # Если в inventory меньше 3 нод — создаём с replica=1..2.
    gluster_replica_count: "{{ ([ (gluster_active_nodes | default([]) | length), 3 ] | min) | int }}"
    gluster_bricks_for_create: "{{ (gluster_active_nodes | default([]))[:(gluster_replica_count | int)] }}"
  shell: >-
    gluster volume create {{ gluster_volume_name }}
    {% if gluster_replica_count | int >= 2 %}
    replica {{ gluster_replica_count }}
    {% endif %}
    {{ gluster_bricks_for_create[0] }}:{{ gluster_volume_path }}/{{ gluster_bricks_for_create[0] }}/brick
    {% if gluster_replica_count | int >= 2 %}
    {{ gluster_bricks_for_create[1] }}:{{ gluster_volume_path }}/{{ gluster_bricks_for_create[1] }}/brick
    {% endif %}
    {% if gluster_replica_count | int >= 3 %}
    {{ gluster_bricks_for_create[2] }}:{{ gluster_volume_path }}/{{ gluster_bricks_for_create[2] }}/brick
    {% endif %}
    {{ gluster_volume_create_force }}

# Том может отсутствовать при уже существующем каталоге brick — не вызывать volume set без тома
- name: Check Gluster volume exists (first node)
  when: inventory_hostname == gluster_active_nodes[0]
  become: true
  become_method: sudo
  shell: gluster volume info {{ gluster_volume_name }}
  register: gluster_volume_info_check
  failed_when: false
  changed_when: false

- name: Secure Gluster Volume (on first node)
  when:
    - inventory_hostname == gluster_active_nodes[0]
    - gluster_volume_info_check.rc == 0
  become: true
  become_method: sudo
  vars:
    gluster_auth_allow_ips: >-
      {{
        (
          (groups['swarm_nodes'] | default([]))
          + (groups['haproxy'] | default([]))
          + (groups['traefik'] | default([]))
          + (gluster_active_nodes | default([]))
        )
        | unique
      }}
  shell: >
    gluster volume set {{gluster_volume_name}} auth.allow  \
    {{ gluster_auth_allow_ips | join(',') }},127.0.0.1

- name: Start Gluster Volume (on first node)
  when: inventory_hostname == gluster_active_nodes[0] and gluster_volume_missing_in_cluster | default(false)
  become: true
  become_method: sudo
  shell: gluster volume start {{gluster_volume_name}}

- name: Wait 60s for Gluster volume to be replicated
  when: inventory_hostname == gluster_active_nodes[0] and gluster_volume_missing_in_cluster | default(false)
  become: true
  become_method: sudo
  shell: sleep 60
