---
- name: Check if Swarm has already been initialized
  become: true
  become_method: sudo
  shell: docker node ls
  register: swarm_status
  ignore_errors: true

- name: Add Docker node to existing Swarm as manager
  become: true
  become_method: sudo
  vars:
    swarm_manager_first: "{{ (groups['swarm_managers'] | default([])) | first | default('') }}"
    swarm_join_target_addr: "{{ hostvars[swarm_manager_first].swarm_advertise_addr | default(hostvars[swarm_manager_first].ansible_host | default(swarm_manager_first)) }}"
    swarm_self_advertise_addr: "{{ hostvars[inventory_hostname].swarm_advertise_addr | default(hostvars[inventory_hostname].ansible_host | default(inventory_hostname)) }}"
    swarm_self_listen_addr: "{{ hostvars[inventory_hostname].swarm_listen_addr | default((hostvars[inventory_hostname].swarm_advertise_addr | default(hostvars[inventory_hostname].ansible_host | default(inventory_hostname))) ~ ':2377') }}"
  shell: >-
    docker swarm join
    --token {{ hostvars[swarm_manager_first]['manager_token']['stdout'] }}
    --advertise-addr {{ swarm_self_advertise_addr }}
    --listen-addr {{ swarm_self_listen_addr }}
    {{ swarm_join_target_addr }}:2377
  register: swarm_join_result
  changed_when: >
    (swarm_join_result.rc | int == 0) and
    ('This node joined a swarm as a manager.' in (swarm_join_result.stdout | default('')))
  failed_when: false
  when:
    - swarm_status.rc != 0
    - swarm_manager_first | length > 0
    - inventory_hostname != swarm_manager_first

- name: Wait until manager node becomes active in swarm
  become: true
  become_method: sudo
  shell: docker info --format "{{ '{{' }} .Swarm.LocalNodeState {{ '}}' }}"
  register: swarm_state_after_join
  changed_when: false
  retries: 6
  delay: 5
  until: (swarm_state_after_join.stdout | default('') | trim) == "active"
  when:
    - swarm_status.rc != 0
    - ((groups['swarm_managers'] | default([])) | first | default('')) | length > 0
    - inventory_hostname != ((groups['swarm_managers'] | default([])) | first | default(''))
