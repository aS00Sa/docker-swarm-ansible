---
- name: Check if Swarm has already been initialized
  become: true
  become_method: sudo
  shell: docker node ls
  register: swarm_status
  ignore_errors: true

- name: Add Docker node to existing Swarm as manager
  become: true
  become_method: sudo
  vars:
    swarm_manager_first: "{{ (groups['swarm_managers'] | default([])) | first | default('') }}"
  shell: >-
    docker swarm join
    --token {{ hostvars[swarm_manager_first]['manager_token']['stdout'] }}
    {{ swarm_manager_first }}:2377
  register: swarm_join_result
  changed_when: >
    (swarm_join_result.rc | int == 0) and
    ('This node joined a swarm as a manager.' in (swarm_join_result.stdout | default('')))
  failed_when: false
  when:
    - swarm_status.rc != 0
    - swarm_manager_first | length > 0
    - inventory_hostname != swarm_manager_first

- name: Wait until manager node becomes active in swarm
  become: true
  become_method: sudo
  shell: docker info --format "{{ '{{' }} .Swarm.LocalNodeState {{ '}}' }}"
  register: swarm_state_after_join
  changed_when: false
  retries: 6
  delay: 5
  until: (swarm_state_after_join.stdout | default('') | trim) == "active"
  when:
    - swarm_status.rc != 0
    - swarm_manager_first | length > 0
    - inventory_hostname != swarm_manager_first
