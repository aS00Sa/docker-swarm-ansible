---
- name: Label Swarm nodes that have GFS mount
  when: inventory_hostname == groups['swarm_managers'][0]
  run_once: true
  become: true
  become_method: sudo
  vars:
    gfs_nodes: "{{ (groups['swarm_managers'] | default([])) + (groups['swarm_workers'] | default([])) }}"
  loop: "{{ gfs_nodes | unique }}"
  shell: docker node update --label-add gfs=true {{ hostvars[item].ansible_hostname | default(item) }}
