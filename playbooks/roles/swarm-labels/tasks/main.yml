---
- name: Label Swarm nodes that have GFS mount (by node ID, not hostname)
  when: inventory_hostname in (groups['swarm_managers'] | default([]))
  run_once: true
  vars:
    gfs_nodes: "{{ (groups['swarm_managers'] | default([])) + (groups['swarm_workers'] | default([])) }}"
    swarm_label_kv: "gfs=true"
  include_tasks: label-one-node.yml
  loop: "{{ gfs_nodes | unique }}"
  loop_control:
    loop_var: gfs_target_host

- name: Label Traefik nodes (by node ID, not hostname)
  when: inventory_hostname in (groups['swarm_managers'] | default([]))
  run_once: true
  vars:
    traefik_nodes: "{{ groups['traefik'] | default([]) }}"
    swarm_label_kv: "traefik=true"
  include_tasks: label-one-node.yml
  loop: "{{ traefik_nodes | unique }}"
  loop_control:
    loop_var: gfs_target_host
