---
# ansible-playbook -i inventory-prod.ini playbooks/plays/13-traefik.yml
#
# После правок playbooks/generated/traefik-stack.yml на контроллере — применить без полной роли:
#   ansible-playbook -i inventory-prod.ini playbooks/plays/manual-traefik-stack-from-generated.yml -u root
- hosts: traefik
  tags: [traefik]
  roles:
    - role: ../roles/cluster-defaults
  tasks:
    - import_role:
        name: ../roles/traefik
      tags: [traefik]
