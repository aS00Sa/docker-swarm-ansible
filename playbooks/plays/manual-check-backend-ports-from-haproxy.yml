---
- hosts: haproxy
  gather_facts: false
  vars:
    backend_hosts:
      - "37.228.90.184"
      - "37.228.90.190"
      - "37.228.90.138"
    backend_ports:
      - 4000
      - 4010
      - 4020
      - 4040
      - 5000
      - 5010
      - 5020
      - 5030
      - 6000
      - 6010
      - 6020
      - 6030
      - 6040
      - 6050
      - 6060
      - 6080
      - 6090
  tasks:
    - name: Check TCP connectivity to backend app ports
      ansible.builtin.command:
        argv:
          - nc
          - -z
          - -w2
          - "{{ item.0 }}"
          - "{{ item.1 | string }}"
      loop: "{{ backend_hosts | product(backend_ports) | list }}"
      register: backend_port_checks
      changed_when: false
      failed_when: false

    - name: Print backend port matrix
      ansible.builtin.debug:
        msg: "{{ item.item.0 }}:{{ item.item.1 }} {{ 'open' if (item.rc | int) == 0 else 'closed' }}"
      loop: "{{ backend_port_checks.results }}"
