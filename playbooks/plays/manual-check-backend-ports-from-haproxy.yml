---
# С edge (группа [haproxy]): nc к портам приложений.
# Как в Traefik auto_cert_manager без upstream_host в слоте:
# 1) traefik_default_upstream_host — один IP; 2) иначе непустой [test_backend]; 3) иначе [swarm_managers].
- hosts: haproxy
  gather_facts: false
  vars:
    backend_ports:
      - 4000
      - 4010
      - 4020
      - 4040
      - 5000
      - 5010
      - 5020
      - 5030
      - 6000
      - 6010
      - 6020
      - 6030
      - 6040
      - 6050
      - 6060
      - 6080
      - 6090
  tasks:
    - name: Список IP для nc — traefik_default_upstream_host (приоритет)
      when: traefik_default_upstream_host | default('') | trim | length > 0
      ansible.builtin.set_fact:
        backend_hosts: "{{ [traefik_default_upstream_host | trim] }}"

    - name: Список IP для nc — [test_backend], если непустая
      when:
        - traefik_default_upstream_host | default('') | trim | length == 0
        - (groups['test_backend'] | default([]) | length) > 0
      ansible.builtin.set_fact:
        backend_hosts: "{{ backend_hosts | default([]) + [((hostvars[item].ansible_host | default(item)) | trim)] }}"
      loop: "{{ groups['test_backend'] | default([]) }}"
      loop_control:
        label: "{{ item }}"

    - name: Список IP для nc — иначе ansible_host каждого swarm_manager
      when:
        - traefik_default_upstream_host | default('') | trim | length == 0
        - (groups['test_backend'] | default([]) | length) == 0
      ansible.builtin.set_fact:
        backend_hosts: "{{ backend_hosts | default([]) + [((hostvars[item].ansible_host | default(item)) | trim)] }}"
      loop: "{{ groups['swarm_managers'] | default([]) }}"
      loop_control:
        label: "{{ item }}"

    - name: Нужен хотя бы один upstream для проверки
      ansible.builtin.assert:
        that:
          - (backend_hosts | default([]) | length) > 0
        fail_msg: >-
          Задайте traefik_default_upstream_host, или добавьте хосты в [test_backend], или [swarm_managers] с ansible_host.

    - name: Check TCP connectivity to backend app ports
      ansible.builtin.command:
        argv:
          - nc
          - -z
          - -w2
          - "{{ item.0 }}"
          - "{{ item.1 | string }}"
      loop: "{{ backend_hosts | product(backend_ports) | list }}"
      register: backend_port_checks
      changed_when: false
      failed_when: false

    - name: Print backend port matrix
      ansible.builtin.debug:
        msg: "{{ item.item.0 }}:{{ item.item.1 }} {{ 'open' if (item.rc | int) == 0 else 'closed' }}"
      loop: "{{ backend_port_checks.results }}"
