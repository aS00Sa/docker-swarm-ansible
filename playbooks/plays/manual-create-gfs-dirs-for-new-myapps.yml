---
# Создать подкаталоги стека на смонтированном Gluster (gluster_mount_path/stacks/<stack_name>/…).
# Пути вида …/<app>/data для bind — список в playbooks/dynamic/gfs_default_app_bind_paths.yml + create-gfs-app-dirs-from-dynamic-list.yml
# ansible-playbook -i inventory-prod.ini playbooks/plays/manual-create-gfs-dirs-for-new-myapps.yml -e stack_name=myapp
# Опционально: -e 'stack_dirs=["app-data","db","logs"]'
- hosts: swarm_managers:swarm_workers
  gather_facts: true
  roles:
    - role: ../roles/cluster-defaults
  tasks:
    - name: Ensure stack_name is provided
      assert:
        that:
          - stack_name is defined
          - (stack_name | length) > 0
        fail_msg: "Provide -e stack_name=<stack> (e.g. -e stack_name=myapp)"

    - name: Ensure default stack_dirs
      set_fact:
        stack_dirs_effective: "{{ stack_dirs | default(['app-data', 'db']) }}"

    - name: Create stack directories on GFS
      become: true
      become_method: sudo
      loop: "{{ stack_dirs_effective }}"
      file:
        path: "{{ gluster_mount_path }}/stacks/{{ stack_name }}/{{ item }}"
        state: directory
        mode: "0775"
