- name: Set monitoring label on all swarm managers
  hosts: "swarm_managers[0]"
  become: true
  gather_facts: false
  tasks:
    - name: Get all manager node hostnames
      ansible.builtin.command:
        argv:
          - docker
          - node
          - ls
          - --filter
          - role=manager
          - --format
          - "{{ '{{.Hostname}}' }}"
      register: manager_nodes
      changed_when: false

    - name: Set monitoring=true on all managers
      ansible.builtin.command:
        argv:
          - docker
          - node
          - update
          - --label-add
          - monitoring=true
          - "{{ item }}"
      loop: "{{ manager_nodes.stdout_lines }}"
      register: label_update
      changed_when: true

    - name: Verify labels on all managers
      ansible.builtin.command:
        argv:
          - docker
          - node
          - inspect
          - "{{ item }}"
          - --format
          - "{{ '{{.Description.Hostname}} labels={{json .Spec.Labels}}' }}"
      loop: "{{ manager_nodes.stdout_lines }}"
      register: label_verify
      changed_when: false

    - name: Print manager labels
      ansible.builtin.debug:
        msg: "{{ label_verify.results | map(attribute='stdout') | list }}"
