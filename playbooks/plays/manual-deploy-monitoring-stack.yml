# monitoring_force_redeploy:
#   true (по умолчанию) — stack rm + удаление docker configs monitoring_* (нужно при смене configs).
#   false — только копирование файлов, сеть monitoring_net и docker stack deploy (идемпотентно, без сноса).
# install.yml и manual-business-stacks-redeploy.yml вызывают с false в конце цепочки (после HAProxy/Traefik и приложений).
- name: Deploy monitoring stack on DVS cluster
  hosts: "swarm_managers[0]"
  become: true
  gather_facts: false
  tasks:
    - name: Ensure monitoring project directory exists on manager
      ansible.builtin.file:
        path: /root/monitoring
        state: directory
        mode: "0755"

    - name: Upload monitoring project files to manager
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../monitoring/"
        dest: /root/monitoring/
        mode: preserve

    - name: Upload Loki config subtree explicitly
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../monitoring/loki/"
        dest: /root/monitoring/loki/
        mode: preserve

    - name: Check Loki config exists on manager
      ansible.builtin.stat:
        path: /root/monitoring/loki/loki-config.yml
      register: monitoring_loki_config_stat

    - name: Fail fast if Loki config is missing before deploy
      ansible.builtin.fail:
        msg: >-
          Required file /root/monitoring/loki/loki-config.yml is missing on manager.
          Re-run this playbook from the beginning (do not use --start-at-task pointing to deploy step).
      when: not (monitoring_loki_config_stat.stat.exists | default(false))

    - name: Remove existing monitoring stack (force redeploy)
      when: (monitoring_force_redeploy | default(true)) | bool
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - rm
          - monitoring
      register: monitoring_stack_rm
      changed_when: true
      failed_when: false

    - name: Wait until monitoring services are removed
      when: (monitoring_force_redeploy | default(true)) | bool
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ls
          - --filter
          - label=com.docker.stack.namespace=monitoring
          - --format
          - "{{ '{{.Name}}' }}"
      register: monitoring_services_after_rm
      changed_when: false
      retries: 30
      delay: 2
      until: (monitoring_services_after_rm.stdout_lines | default([]) | length) == 0

    - name: Collect existing docker configs
      when: (monitoring_force_redeploy | default(true)) | bool
      ansible.builtin.command:
        argv:
          - docker
          - config
          - ls
          - --format
          - "{{ '{{.Name}}' }}"
      register: docker_configs_before_cleanup
      changed_when: false

    - name: Build monitoring config cleanup list
      when: (monitoring_force_redeploy | default(true)) | bool
      ansible.builtin.set_fact:
        monitoring_config_names: >-
          {{
            (docker_configs_before_cleanup.stdout_lines | default([]))
            | select('match', '^monitoring_')
            | list
          }}

    - name: Remove stale monitoring configs
      when:
        - (monitoring_force_redeploy | default(true)) | bool
        - (monitoring_config_names | default([]) | length) > 0
      ansible.builtin.command:
        argv:
          - docker
          - config
          - rm
          - "{{ item }}"
      loop: "{{ monitoring_config_names }}"
      register: monitoring_config_rm
      changed_when: true
      failed_when: false

    - name: Ensure external monitoring network exists before deploy
      ansible.builtin.command:
        argv:
          - docker
          - network
          - create
          - --driver
          - overlay
          - monitoring_net
      register: monitoring_network_create
      changed_when: (monitoring_network_create.rc | default(1)) == 0
      failed_when: >-
        (monitoring_network_create.rc | default(1)) != 0 and
        ('already exists' not in (monitoring_network_create.stderr | default('') | lower))

    - name: Wait until monitoring network is inspectable
      ansible.builtin.command:
        argv:
          - docker
          - network
          - inspect
          - monitoring_net
      register: monitoring_network_inspect
      changed_when: false
      retries: 10
      delay: 1
      until: (monitoring_network_inspect.rc | default(1)) == 0

    - name: Deploy monitoring stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - -c
          - /root/monitoring/docker-compose.yml
          - monitoring
      register: monitoring_deploy
      changed_when: false

    - name: Show monitoring deploy output
      ansible.builtin.debug:
        msg: "{{ monitoring_deploy.stdout }}"

    - name: List monitoring services
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ls
          - --filter
          - label=com.docker.stack.namespace=monitoring
      register: monitoring_services
      changed_when: false

    - name: Print monitoring services
      ansible.builtin.debug:
        msg: "{{ monitoring_services.stdout }}"

    - name: Show monitoring_grafana tasks
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ps
          - monitoring_grafana
          - --no-trunc
      register: ps_grafana
      changed_when: false
      failed_when: false

    - name: Show monitoring_prometheus tasks
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ps
          - monitoring_prometheus
          - --no-trunc
      register: ps_prometheus
      changed_when: false
      failed_when: false

    - name: Show monitoring_node-exporter tasks
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ps
          - monitoring_node-exporter
          - --no-trunc
      register: ps_node_exporter
      changed_when: false
      failed_when: false

    - name: Show monitoring_cadvisor tasks
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ps
          - monitoring_cadvisor
          - --no-trunc
      register: ps_cadvisor
      changed_when: false
      failed_when: false

    - name: Print monitoring task diagnostics
      ansible.builtin.debug:
        msg:
          - "{{ ps_grafana.stdout | default(ps_grafana.stderr, true) }}"
          - "{{ ps_prometheus.stdout | default(ps_prometheus.stderr, true) }}"
          - "{{ ps_node_exporter.stdout | default(ps_node_exporter.stderr, true) }}"
          - "{{ ps_cadvisor.stdout | default(ps_cadvisor.stderr, true) }}"
