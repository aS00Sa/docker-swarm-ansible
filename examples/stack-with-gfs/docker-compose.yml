version: "3.8"

services:
  app:
    image: nginx:alpine
    ports:
      - "8080:80"
    environment:
      TZ: Europe/Moscow
    volumes:
      - app_data:/usr/share/nginx/html
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gfs == true

  db:
    image: postgres:16-alpine
    environment:
      TZ: Europe/Moscow
      POSTGRES_PASSWORD: example
      POSTGRES_DB: example
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gfs == true

volumes:
  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/app-data
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/db-data
