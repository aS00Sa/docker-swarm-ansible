version: "3.8"

services:
  inhome-postgres:
    image: postgres:17
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.betradar.vpn != yes
      restart_policy:
        condition: on-failure
        delay: 10s
      update_config:
        order: stop-first
        failure_action: rollback
    ports:
      - "${POSTGRES_PORT_DOCKER:-}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - TZ=Europe/Moscow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=db
    command:
      - postgres
      - -c
      - wal_compression=on
    networks:
      - inhome-network

  # Экспорт базы в файлы каждые 15 минут (удобно забирать rsync'ом).
  # Важно: дампы пишем на ЛОКАЛЬНЫЙ диск manager-ноды, не в GFS.
  inhome-infra-postgres-backup:
    image: postgres:17
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.betradar.vpn != yes
      restart_policy:
        condition: on-failure
        delay: 10s
      update_config:
        order: stop-first
        failure_action: rollback
    command:
      - sh
      - -ceu
      - |
        mkdir -p /backups
        while true; do
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          out="/backups/${PGDATABASE}-${ts}.sql.gz"
          echo "[$(date -u +%FT%TZ)] dumping to ${out}"
          pg_dump --no-owner --no-privileges | gzip -c > "${out}.tmp"
          mv "${out}.tmp" "${out}"
          # ротация: оставляем последние 7 дней при интервале 15 минут (672 файлов)
          (ls -1t /backups/*.sql.gz 2>/dev/null || true) | tail -n +673 | xargs -r rm -f
          sleep 900
        done
    environment:
      - TZ=Europe/Moscow
      - PGHOST=inhome-postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=db
    volumes:
      - postgres-backups:/backups
    networks:
      - inhome-network

  inhome-redis:
    image: redis:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.betradar.vpn != yes
        preferences:
          - spread: node.role
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback
    ports:
      - "${REDIS_PORT_DOCKER:-}:6379"
    volumes:
      - redis-data:/data
    environment:
      - TZ=Europe/Moscow
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      # активный sync на диск: AOF + fsync каждую секунду
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      # плюс более частые RDB-снэпшоты
      - --save
      - "300"
      - "1"
      - --save
      - "60"
      - "1000"
    networks:
      - inhome-network

  inhome-rabbitmq:
    image: rabbitmq:3-management
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.betradar.vpn != yes
        preferences:
          - spread: node.role
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        order: stop-first
        failure_action: rollback
    ports:
      - "${RABBITMQ_PORT_DOCKER:-}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT_DOCKER:-}:15672"
    environment:
      - TZ=Europe/Moscow
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - inhome-network

  inhome-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.betradar.vpn != yes
        preferences:
          - spread: node.role
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        order: stop-first
        failure_action: rollback
    environment:
      - TZ=Europe/Moscow
      - MINIO_ROOT_USER=${MINIO_APP_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_APP_PASSWORD}
    ports:
      - "${MINIO_PORT_DOCKER:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_DOCKER:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - inhome-network

networks:
  inhome-network:
    external: true

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/inhome-postgres/data
  postgres-backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/backups/inhome-infra/postgres-backups
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/inhome-redis/data
  rabbitmq-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/inhome-rabbitmq/data
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gfs/inhome-minio/data

