[all:vars]
traefik_version=v3.6.10

# Domain used in docker swarm nodes
app_domain_name=btnxlocal.ru

# Auto hostname (роль host-defaults); false = не переименовывать хосты по группам inventory
host_defaults_auto_hostname_enabled=true








# HAProxy / Traefik: TCP passthrough vs L7 на edge (см. роли haproxy / traefik)
# На хосте: HAProxy слушает 80/443; Traefik (docker) — только эти порты (не 80/443 в compose).
##haproxy_traefik_web_port=8080
##haproxy_traefik_websecure_port=8443
haproxy_docker_tls_termination=true
haproxy_https_mode=http_terminate
# Docker pull/push к nexus.*:9080–9082 — клиент ходит по HTTPS; без этого HAProxy слушает plain HTTP → «server gave HTTP response to HTTPS client».
# L7 TLS на HAProxy + ACL gitlab.*/nexus.* → прямые бэкенды (см. cert_manager gitlab.* / nexus.*).


cert_manager_enabled=true
cert_manager_use_shared_storage=false
# Один экземпляр cert-manager (compose) без VIP — по inventory_hostname (аналогично tsts-контру).
cert_manager_singleton_inventory_hostnames=["188.225.43.161"]
# Не задавайте cert_manager_certs=[] — в .ini это часто строка "[]"; для слотов cert_manager_certs1..N строку cert_manager_certs не нужна.
cert_manager_certs1={"cert_name":"gitlab.btnxlocal.ru","domains":["gitlab.btnxlocal.ru"],"upstream_host":"176.214.178.139","upstream_scheme":"http","upstream_port":8443,"router_name":"gitlab-server","service_name":"gitlab-server","middlewares":["compress","hsts","retry"],"traefik_gitlab_ssh_enabled":true,"traefik_gitlab_ssh_port":2222,"traefik_gitlab_ssh_upstream_host":"176.214.178.139","traefik_gitlab_ssh_upstream_port":2222}
#cert_manager_certs2={"cert_name":"nexus.btnxlocal.ru","domains":["nexus.btnxlocal.ru"],"upstream_host":"213.27.111.163","upstream_scheme":"http","upstream_port":8081,"entrypoints":["websecure","docker-hosted","docker-proxy","docker-group"],"upstream_ports_by_entrypoint":{"websecure":8081,"docker-hosted":9080,"docker-proxy":9081,"docker-group":9082},"middlewares":["compress","hsts","retry"]}
cert_manager_certs2={"cert_name":"nexus.btnxlocal.ru","domains":["nexus.btnxlocal.ru"],"upstream_host":"80.237.49.188","upstream_scheme":"http","upstream_port":8081,"entrypoints":["websecure","docker-hosted","docker-proxy","docker-group"],"upstream_ports_by_entrypoint":{"websecure":8081,"docker-hosted":9080,"docker-proxy":9081,"docker-group":9082},"middlewares":["compress","hsts","retry"]}

## Способ хранения данных Gluster (роль gluster)
# Устройство для хранения данных, например /dev/sdb
# Непустой device2_hdd_dev — отдельный диск: XFS, монтирование в gluster_volume_path/<host>.
# Пустой device2_hdd_dev= — bricks на локальной ФС под gluster_volume_path.
device2_hdd_dev=""
# Путь для томов GlusterFS
gluster_volume_path=/glusterfs/bricks
# Имя тома для GlusterFS
gluster_volume_name=gfs
# Путь монтирования GlusterFS
gluster_mount_path=/mnt/gfs
# Каталоги под bind на GFS: список — playbooks/dynamic/gfs_default_app_bind_paths.yml; прогон — create-gfs-app-dirs-from-dynamic-list.yml

# Docker: Nexus btnxlocal как insecure registry (HTTP к 192.168.25.126). Имя должно резолвиться (DNS или /etc/hosts на нодах).
#docker_insecure_registries=["nexus.btnxlocal.ru:9080","nexus.btnxlocal.ru:9081","nexus.btnxlocal.ru:9082","192.168.25.126:9080","192.168.25.126:9081","192.168.25.126:9082"]

# false — без жёсткого lockdown; true — узкие правила iptables (роль firewall-iptables)
firewall_lockdown=false
# Синтаксис как у docker_insecure_registries: одна строка, массив в квадратных скобках, элементы в двойных кавычках.
firewall_trusted_admin_cidrs=["109.195.238.187","83.217.203.122","172.25.147.160","95.31.196.116","192.168.0.0/16","172.16.0.0/12","10.0.0.0/8"]
# false — SSH с любого IP при lockdown; true — только кластер и firewall_trusted_admin_cidrs (в проде часто true + непустые CIDR)
firewall_allow_ssh_only_admin=false
# false — ping с любого IP при lockdown; true — только кластер и admin CIDR
firewall_allow_icmp_only_admin=false
#
firewall_restrict_swarm_ports=true
firewall_restrict_portainer_service_ports=true
firewall_restrict_gluster_service_ports=true
firewall_restrict_rpcbind_ports=true

# Keepalived (VIP) for HAProxy:
# Добавьте группу [haproxy] с 1-2 (или более) узлами.
# keepalived_vip_cidr="10.20.10.253/24" автоматически ставится и настраивается keepalived (+ VRRP в firewall lockdown)
# Пусто keepalived_vip_cidr — без keepalived.
keepalived_vip_cidr=""
keepalived_interface="eth0"

#
# mkpasswd --method=SHA-512
# user for ansible
#ansible_user="debian"
#ansible_become_pass=""
#ansible_user="root"
#ansible_ssh_pass=""
ansible_connection="ssh"
# Приватный ключ для SSH (без суффикса .pub). Файл .pub для входа не подходит.
ansible_ssh_private_key_file=~/.ssh/id_ed25519
# Справочно: путь к парному публичному ключу
ansible_ssh_rsa="~/.ssh/id_ed25519.pub"
# cat ~/.ssh/id_rsa.pub
