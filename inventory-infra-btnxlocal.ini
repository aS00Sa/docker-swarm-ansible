[all:vars]
traefik_version=v3.6.10
# Auto hostname generation from inventory role groups
host_defaults_auto_hostname_enabled=true
# Domain used in docker swarm nodes
app_domain_name=btnxlocal.ru

cert_manager_enabled=true
cert_manager_use_shared_storage=false # true=GlusterFS, false=local /opt

# Многосайтовые LE: по одному сайту на cert_manager_certs1, cert_manager_certs2, … (при пустом cert_manager_certs в inventory действует default [] — см. роль cert-manager).
cert_manager_certs1={"cert_name":"gitlab.btnxlocal.ru","domains":["gitlab.btnxlocal.ru"],"upstream_host":"192.168.25.125","upstream_scheme":"http","upstream_port":8443,"router_name":"gitlab-server","service_name":"gitlab-server","middlewares":["compress","hsts","retry"],"traefik_gitlab_ssh_enabled":true,"traefik_gitlab_ssh_port":2222,"traefik_gitlab_ssh_upstream_host":"192.168.25.125","traefik_gitlab_ssh_upstream_port":2222}
# Docker registries via HAProxy -> Traefik (one cert for nexus.*):
# 8081 = websecure, 9080/9081/9082 = docker-hosted/proxy/group (см. upstream_ports_by_entrypoint в cert_manager_certs2)
cert_manager_certs2={"cert_name":"nexus.btnxlocal.ru","domains":["nexus.btnxlocal.ru"],"upstream_host":"192.168.25.126","upstream_scheme":"http","upstream_port":8081,"entrypoints":["websecure","docker-hosted","docker-proxy","docker-group"],"upstream_ports_by_entrypoint":{"websecure":8081,"docker-hosted":9080,"docker-proxy":9081,"docker-group":9082},"middlewares":["compress","hsts","retry"]}

## Способ хранения данных Gluster (роль gluster)
# Устройство для хранения данных, например /dev/sdb
# Непустой device2_hdd_dev — отдельный диск: XFS, монтирование в gluster_volume_path/<host>.
# Пустой device2_hdd_dev= — bricks на локальной ФС под gluster_volume_path.
device2_hdd_dev=""
# Путь для томов GlusterFS
gluster_volume_path=/glusterfs/bricks
# Имя тома для GlusterFS
gluster_volume_name=gfs
# Путь монтирования GlusterFS
gluster_mount_path=/mnt/gfs

firewall_lockdown=false
firewall_trusted_admin_cidrs=["192.168.25.0/23","109.195.238.187"]
# false — SSH с любого IP при lockdown; true — только кластер и firewall_trusted_admin_cidrs (в проде часто true + непустые CIDR)
firewall_allow_ssh_only_admin=false

# false — ping с любого IP при lockdown; true — только кластер и admin CIDR
firewall_allow_icmp_only_admin=false

# HAProxy edge -> Traefik upstream targets
haproxy_traefik_upstream_group=gluster_nodes

# Keepalived (VIP) for HAProxy:
# Добавьте группу [haproxy] с 1-2 (или более) узлами.
# keepalived_vip_cidr="10.20.10.253/24" автоматически ставится и настраивается keepalived (+ VRRP в firewall lockdown)
# Пусто keepalived_vip_cidr — без keepalived.
keepalived_vip_cidr=""
keepalived_interface="eth0"

#
# mkpasswd --method=SHA-512
# user for ansible
#ansible_user="debian"
#ansible_become_pass=""
#ansible_user="root"
#ansible_ssh_pass=""
ansible_connection="ssh"
# Приватный ключ для SSH (без суффикса .pub). Файл .pub для входа не подходит.
ansible_ssh_private_key_file=~/.ssh/id_ed25519
# Справочно: путь к парному публичному ключу
ansible_ssh_rsa="~/.ssh/id_ed25519.pub"
# cat ~/.ssh/id_rsa.pub
ansible_ssh_key="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL5yX4w/4ydrZBoSpp6XWUq+TnbZODB3lFwAy4an6tnJ aSSa@MS-7D48"