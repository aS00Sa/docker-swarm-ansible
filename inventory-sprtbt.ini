[all:vars]
traefik_version=v3.6.10

# Domain used in docker swarm nodes
app_domain_name=sprtbt.com

# Auto hostname (роль host-defaults); false = не переименовывать хосты по группам inventory
host_defaults_auto_hostname_enabled=false
# Все сайты из cert_manager_certs* (auto_cert_manager) без поля upstream_host → этот адрес:порт из слота.
#traefik_default_upstream_host=37.228.90.184

# CORS: разрешаем все origin (поведение как в legacy-шаблонах с accessControlAllowOriginListRegex: [".*"]).
traefik_cors_allow_origin_list_regex=[".*"]

# HAProxy / Traefik: TCP passthrough vs L7 на edge (см. роли haproxy / traefik)
# На хосте: HAProxy слушает 80/443; Traefik (docker) — только эти порты (не 80/443 в compose).
haproxy_traefik_web_port=8080
haproxy_traefik_websecure_port=8443
haproxy_docker_tls_termination=false

haproxy_https_mode=tcp_passthrough
# DEV: прямой L7-апстрим приложений с HAProxy на swarm_managers (обход Traefik).


haproxy_app_upstream_mode=traefik
haproxy_app_upstream_group=traefik
# Optional separate Portainer Edge Agent stack
portainer_edge_enabled=false
# portainer_edge_id=a41cda8c-ddc0-4e62-8a67-c35a543b883f
# portainer_edge_key=92048887896738844174015353114318
# portainer_edge_insecure_poll=true

cert_manager_enabled=true
cert_manager_use_shared_storage=false
# Один экземпляр cert-manager (compose) без VIP — по inventory_hostname (аналогично tsts-контру).
cert_manager_singleton_inventory_hostnames=["72.56.32.35"]

# CORS: разрешаем все origin (поведение как в legacy-шаблонах с accessControlAllowOriginListRegex: [".*"]).
traefik_cors_allow_origin_list_regex=[".*"]

# Все сайты из cert_manager_certs* (auto_cert_manager) без upstream_host → ОДИН HTTP upstream:
# http://<этот IP>:<upstream_port из слота> (4000, 4010, …). Без него — managers или test_backend; при неверном IP
# или закрытых портах с edge Traefik даёт 502 Bad Gateway, хотя сервисы на воркерах «живы».
# Не задавайте cert_manager_certs=[] — в .ini это часто строка "[]"; для слотов cert_manager_certs1..N строку cert_manager_certs не нужна.
cert_manager_certs1={"cert_name":"sprtbt.com","domains":["sprtbt.com","www.sprtbt.com"],"upstream_scheme":"http","upstream_port":4000,"router_name":"frontend-root","service_name":"frontend-main","middlewares":["compress","hsts","retry"]}
